name: Build APK - Core Engine v1

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract User Web Payload
        run: |
          mkdir -p www
          unzip -o "${ZIP_NAME}" -d www/ || true
          INDEX_PATH=$(find www -type f \( -name "index.html" -o -name "index.php" \) | head -n 1)
          if [ -n "$INDEX_PATH" ]; then
              SUBDIR=$(dirname "$INDEX_PATH")
              if [ "$SUBDIR" != "www" ]; then
                  mv "$SUBDIR"/* www/ || true
              fi
          fi

      - name: Initialize Capacitor Project
        run: |
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 --legacy-peer-deps
          SAFE_PACKAGE_ID=$(echo "${PACKAGE_ID}" | sed -e 's/[^a-zA-Z0-9.]//g')
          echo "SAFE_PACKAGE_ID=$SAFE_PACKAGE_ID" >> $GITHUB_ENV
          
          cat << EOF > capacitor.config.json
          {
            "appId": "${SAFE_PACKAGE_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF
          
          npx cap add android

      - name: Generate App Icons
        run: |
          npm install -g @capacitor/assets@3 --legacy-peer-deps
          mkdir -p assets
          if [ -f "www/_app_icon.png" ]; then
            cp www/_app_icon.png assets/icon.png
          else
            wget -qO assets/icon.png https://raw.githubusercontent.com/ionic-team/capacitor-assets/main/assets/icon-only.png
          fi
          npx capacitor-assets generate --android || echo "Icon generation failed, using defaults."

      - name: Install Core Plugins
        run: |
          npm install @capacitor/splash-screen@6 @capacitor/status-bar@6 --legacy-peer-deps
          npx cap sync android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Package APK into ZIP
        run: |
          mkdir -p ../release_artifacts
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          cp "$APK_PATH" "../release_artifacts/app.apk"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Release ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: "Automated Capacitor Native Build for **${{ env.APP_NAME }}**"
          files: |
            release_artifacts/app.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary payload [skip ci]" || true
          git push origin main || git push origin master || true
