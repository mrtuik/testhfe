name: Build APK with Capacitor

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Licenses Auto-Accept)
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Fetch Website Archive and Verify Assets
        run: |
          echo "Verifying local web workspace ZIP archive inside repository..."
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          
          mkdir -p raw_assets
          unzip -o "${ZIP_NAME}" -d raw_assets/
          
          if [ ! -f raw_assets/app_config.json ]; then
              echo "Creating missing app_config.json fallback parameters..."
              echo '{"appName":"'"$APP_NAME"'","packageName":"'"$PACKAGE_ID"'","versionName":"'"$VERSION_NAME"'","versionCode":'"$VERSION_CODE"'}' > raw_assets/app_config.json
          fi

      - name: Write Automated package.json with All Required and Compatible Plugins
        run: |
          cat << 'EOF' > package.json
          {
            "name": "capacitor-app",
            "version": "1.0.0",
            "description": "Capacitor App built with HopFile Editor",
            "dependencies": {
              "@capacitor/action-sheet": "^6.0.0",
              "@capacitor/app": "^6.0.0",
              "@capacitor/app-launcher": "^6.0.0",
              "@capacitor/browser": "^6.0.0",
              "@capacitor/camera": "^6.0.0",
              "@capacitor/clipboard": "^6.0.0",
              "@capacitor/device": "^6.0.0",
              "@capacitor/dialog": "^6.0.0",
              "@capacitor/filesystem": "^6.0.0",
              "@capacitor/geolocation": "^6.0.0",
              "@capacitor/haptics": "^6.0.0",
              "@capacitor/keyboard": "^6.0.0",
              "@capacitor/local-notifications": "^6.0.0",
              "@capacitor/motion": "^6.0.0",
              "@capacitor/network": "^6.0.0",
              "@capacitor/preferences": "^6.0.0",
              "@capacitor/push-notifications": "^6.0.0",
              "@capacitor/share": "^6.0.0",
              "@capacitor/splash-screen": "^6.0.0",
              "@capacitor/status-bar": "^6.0.0",
              "@capacitor/text-zoom": "^6.0.0",
              "@capacitor/toast": "^6.0.0",
              "@capacitor/background-task": "^6.0.0",
              "@capacitor-community/admob": "^6.0.0-rc.0",
              "@capacitor-community/text-to-speech": "^6.0.0",
              "@capawesome/capacitor-file-picker": "^6.0.0",
              "@capgo/capacitor-native-audio": "^6.0.1",
              "capacitor-music-controls-plugin": "^6.0.0-beta.1"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF
          
          # Appending --legacy-peer-deps to ignore community plugin dependency limits
          npm install --legacy-peer-deps

      - name: Initialize Capacitor 6 Project Structure
        run: |
          APP_NAME_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').appName || '$APP_NAME')")
          PACKAGE_ID_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').packageName || '$PACKAGE_ID')")
          
          echo "Initializing Capacitor with App Name: $APP_NAME_CONFIG, Package ID: $PACKAGE_ID_CONFIG"
          npx cap init "$APP_NAME_CONFIG" "$PACKAGE_ID_CONFIG" --web-dir=www
          
          mkdir -p www
          cp -r raw_assets/* www/
          
          npx cap add android

      - name: Fetch and Bundle Native PHP 8.4 Binary for Android ARM64
        run: |
          PHP_ENABLED=$(node -e "console.log(require('./www/app_config.json').phpSupport !== false)")
          if [ "$PHP_ENABLED" = "true" ]; then
              echo "Downloading PocketMine PHP 8.4 static binary for Android arm64..."
              wget -q https://github.com/pmmp/PHP-Binaries/releases/download/pm5-php-8.4-latest/PHP-8.4-Android-arm64-PM5.tar.gz -O php.tar.gz
              tar -xzf php.tar.gz
              
              PHP_BIN_PATH=$(find . -name "php" -type f -print -quit)
              if [ -n "$PHP_BIN_PATH" ]; then
                  mkdir -p android/app/src/main/jniLibs/arm64-v8a
                  cp "$PHP_BIN_PATH" android/app/src/main/jniLibs/arm64-v8a/libphp.so
                  echo "Successfully packed ARM64 PHP binary to libphp.so."
              else
                  echo "ERROR: PHP binary could not be found in tarball!"
                  exit 1
              fi
          else
              echo "PHP Support is disabled. Skipping native binary download."
          fi

      - name: Sync Web Directory and Plugins to Android Template
        run: |
          echo "Running Capacitor Sync..."
          npx cap sync android

      - name: Run Debug APK Compilation Task
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Package Debug APK with Credits Document
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          cat << 'EOF' > android/app/build/outputs/apk/debug/credits.txt
          ==================================================
          HopFile Editor - Build Package
          ==================================================
          This package was generated dynamically by HopFile Editor Workspace.

          Credits:
          HopFile Editor is designed, developed, and maintained by tuik.
          All rights reserved.

          Thank you for choosing HopFile Editor as your Mobile IDE & Compiler!
          ==================================================
          EOF
          
          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk $APK_NAME
          zip -r $ZIP_NAME $APK_NAME credits.txt

      - name: Generate Dynamic Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          TAG="release-${CLEANED_NAME}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Artifact Target
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package build generated via HopFile Editor (Capacitor 6 Engine).
            - **Package ID:** `${{ env.PACKAGE_ID }}`
            - **Build ID:** `${{ github.run_number }}`
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload ZIP
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary build payload [skip ci]" || true
          git push origin main || git push origin master || true
