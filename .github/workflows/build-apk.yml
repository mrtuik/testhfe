name: Build APK with Capacitor

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Licenses Auto-Accept)
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Fetch Website Archive and Verify Assets
        run: |
          echo "Verifying local web workspace ZIP archive inside repository..."
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          
          mkdir -p raw_assets
          unzip -o "${ZIP_NAME}" -d raw_assets/
          
          if [ ! -f raw_assets/app_config.json ]; then
              echo "Creating missing app_config.json fallback parameters..."
              echo '{"appName":"'"$APP_NAME"'","packageName":"'"$PACKAGE_ID"'","versionName":"'"$VERSION_NAME"'","versionCode":'"$VERSION_CODE"'}' > raw_assets/app_config.json
          fi

      - name: Write Automated package.json with Bulletproof Plugin Matrix
        run: |
          cat << 'EOF' > package.json
          {
            "name": "capacitor-app",
            "version": "1.0.0",
            "description": "Capacitor App built with HopFile Editor",
            "dependencies": {
              "@capacitor/core": "^6.2.0",
              "@capacitor/android": "^6.2.0",
              "@capacitor/app": "^6.0.0",
              "@capacitor/app-launcher": "^6.0.0",
              "@capacitor/action-sheet": "^6.0.0",
              "@capacitor/browser": "^6.0.0",
              "@capacitor/camera": "^6.0.0",
              "@capacitor/clipboard": "^6.0.0",
              "@capacitor/device": "^6.0.0",
              "@capacitor/dialog": "^6.0.0",
              "@capacitor/filesystem": "^6.0.0",
              "@capacitor/geolocation": "^6.0.0",
              "@capacitor/haptics": "^6.0.0",
              "@capacitor/keyboard": "^6.0.0",
              "@capacitor/local-notifications": "^6.0.0",
              "@capacitor/motion": "^6.0.0",
              "@capacitor/network": "^6.0.0",
              "@capacitor/preferences": "^6.0.0",
              "@capacitor/push-notifications": "^6.0.0",
              "@capacitor/share": "^6.0.0",
              "@capacitor/splash-screen": "^6.0.0",
              "@capacitor/status-bar": "^6.0.0",
              "@capacitor/text-zoom": "^6.0.0",
              "@capacitor/toast": "^6.0.0",
              "@capacitor-community/admob": "*",
              "@capacitor-community/apple-sign-in": "*",
              "@capacitor-community/bluetooth-le": "*",
              "@capacitor-community/camera-preview": "*",
              "@capacitor-community/contacts": "*",
              "@capacitor-community/keep-awake": "*",
              "@capacitor-community/media": "*",
              "@capacitor-community/sqlite": "*",
              "@capacitor-community/text-to-speech": "*",
              "@capacitor-community/speech-recognition": "*",
              "@capawesome/capacitor-app-update": "*",
              "@capawesome/capacitor-app-shortcuts": "*",
              "@capawesome/capacitor-badge": "*",
              "@capawesome/capacitor-file-picker": "*",
              "@capawesome/capacitor-file-opener": "*",
              "@capawesome/capacitor-mlkit-barcode-scanning": "*",
              "@capawesome/capacitor-nfc": "*",
              "@capawesome/capacitor-screen-orientation": "*",
              "@capawesome-team/capacitor-android-foreground-service": "*",
              "@capawesome/capacitor-firebase-authentication": "*",
              "@capawesome/capacitor-firebase-messaging": "*",
              "@capawesome/capacitor-firebase-firestore": "*",
              "@capgo/capacitor-updater": "*",
              "@capgo/native-audio": "*",
              "@capgo/capacitor-native-biometric": "*",
              "@capgo/inappreview": "*",
              "@capgo/capacitor-social-login": "*",
              "@capgo/capacitor-screen-recorder": "*",
              "@capgo/background-task": "*",
              "@transistorsoft/capacitor-background-fetch": "*",
              "@transistorsoft/capacitor-background-geolocation": "*",
              "capacitor-native-settings": "*",
              "capacitor-video-player": "*"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.2.0"
            }
          }
          EOF
          
          # PERMANENT FIX: Force resolve all dependencies regardless of strict peer limits
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Initialize Capacitor 6 Project Structure
        run: |
          APP_NAME_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').appName || '$APP_NAME')")
          PACKAGE_ID_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').packageName || '$PACKAGE_ID')")
          
          echo "Initializing Capacitor with App Name: $APP_NAME_CONFIG, Package ID: $PACKAGE_ID_CONFIG"
          npx cap init "$APP_NAME_CONFIG" "$PACKAGE_ID_CONFIG" --web-dir=www
          
          mkdir -p www
          cp -r raw_assets/* www/
          
          npx cap add android

      - name: Fetch and Bundle Native PHP 8.4 Binary for Android ARM64
        run: |
          PHP_ENABLED=$(node -e "console.log(require('./www/app_config.json').phpSupport !== false)")
          if [ "$PHP_ENABLED" = "true" ]; then
              echo "Downloading PocketMine PHP 8.4 static binary for Android arm64..."
              wget -q https://github.com/pmmp/PHP-Binaries/releases/download/pm5-php-8.4-latest/PHP-8.4-Android-arm64-PM5.tar.gz -O php.tar.gz
              tar -xzf php.tar.gz
              
              PHP_BIN_PATH=$(find . -name "php" -type f -print -quit)
              if [ -n "$PHP_BIN_PATH" ]; then
                  mkdir -p android/app/src/main/jniLibs/arm64-v8a
                  cp "$PHP_BIN_PATH" android/app/src/main/jniLibs/arm64-v8a/libphp.so
                  echo "Successfully packed ARM64 PHP binary to libphp.so."
              else
                  echo "ERROR: PHP binary could not be found in tarball!"
                  exit 1
              fi
          else
              echo "PHP Support is disabled. Skipping native binary download."
          fi

      - name: Clear Legacy Java Packages
        run: |
          # Completely clean default Capacitor java structures to prevent R class collisions
          rm -rf android/app/src/main/java/*

      - name: Inject Custom Native Java Bridges & Resources
        run: |
          python3 -m pip install Pillow
          
          cat << 'EOF' > build_assets.py
          import json
          import os
          import shutil
          from PIL import Image

          config_path = "www/app_config.json"
          config = {}
          if os.path.exists(config_path):
              with open(config_path, "r") as f:
                  config = json.load(f)

          # Extract configuration metrics
          app_name = config.get("appName", os.environ.get("APP_NAME", "My App"))
          package_id = config.get("packageName", os.environ.get("PACKAGE_ID", "com.example.runner"))
          version_name = config.get("versionName", os.environ.get("VERSION_NAME", "1.0.0"))
          version_code = int(config.get("versionCode", os.environ.get("VERSION_CODE", "1")))
          theme_color = config.get("themeColor", "#4F46E5")
          homepage = config.get("homepage", "index.html")
          screen_rotation = config.get("screenRotation", "auto")
          splash_bg_color = config.get("splashBgColor", "#111827")
          
          # Dynamic Feature Toggles
          camera_enabled = config.get("cameraEnabled", True)
          notifications_enabled = config.get("notificationsEnabled", True)
          local_storage_enabled = config.get("localStorageEnabled", True)
          microphone_enabled = config.get("microphoneEnabled", True)
          location_enabled = config.get("locationEnabled", False)
          biometric_enabled = config.get("biometricEnabled", False)
          file_transfer_enabled = config.get("fileTransferEnabled", True)
          clipboard_enabled = config.get("clipboardEnabled", True)
          double_back_exit_enabled = config.get("doubleBackExitEnabled", True)
          keep_screen_on_enabled = config.get("keepScreenOnEnabled", True)
          secure_window_enabled = config.get("secureWindowEnabled", False)
          external_browser_enabled = config.get("externalBrowserEnabled", True)

          # Auto-detect PHP support
          has_php_files = any(file.endswith(".php") for root, dirs, files in os.walk("www") for file in files)
          php_support = config.get("phpSupport", True) and has_php_files
          php_port = int(config.get("phpPort", 8080))

          # Gradle template using default debug signing
          app_build_gradle_template = """
          apply plugin: 'com.android.application'
          android {
              namespace '__PACKAGE_ID__'
              compileSdk 35
              defaultConfig {
                  applicationId "__PACKAGE_ID__"
                  minSdk 24
                  targetSdk 35
                  versionCode __VERSION_CODE__
                  versionName "__VERSION_NAME__"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
              implementation 'androidx.webkit:webkit:1.6.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media:media:1.6.0'
          }
          """
          app_build_gradle = app_build_gradle_template.replace("__PACKAGE_ID__", package_id).replace("__VERSION_CODE__", str(version_code)).replace("__VERSION_NAME__", version_name)
          with open("android/app/build.gradle", "w") as f:
              f.write(app_build_gradle.strip())

          # Generate system assets XML Configurations
          os.makedirs("android/app/src/main/res/values", exist_ok=True)
          colors_xml = f"""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">{theme_color}</color>
              <color name="colorPrimaryDark">{theme_color}</color>
              <color name="colorAccent">{theme_color}</color>
              <color name="splashBg">{splash_bg_color}</color>
          </resources>
          """
          with open("android/app/src/main/res/values/colors.xml", "w") as f:
              f.write(colors_xml.strip())
          
          styles_xml = """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>
          """
          with open("android/app/src/main/res/values/styles.xml", "w") as f:
              f.write(styles_xml.strip())

          # Write dynamic strings metadata resource
          strings_xml = f"""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">{app_name}</string>
              <string name="title_activity_main">{app_name}</string>
              <string name="package_name">{package_id}</string>
          </resources>"""
          with open("android/app/src/main/res/values/strings.xml", "w") as f:
              f.write(strings_xml.strip())

          # Setup Android Manifest Injections
          camera_p = '<uses-permission android:name="android.permission.CAMERA" />' if camera_enabled else ""
          audio_p = '<uses-permission android:name="android.permission.RECORD_AUDIO" /><uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' if microphone_enabled else ""
          notif_p = '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" /><uses-permission android:name="android.permission.FOREGROUND_SERVICE" /><uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />' if notifications_enabled else ""
          storage_p = '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" /><uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" /><uses-permission android:name="android.permission.READ_MEDIA_IMAGES" /><uses-permission android:name="android.permission.READ_MEDIA_AUDIO" /><uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />' if (local_storage_enabled or file_transfer_enabled) else ""
          location_p = '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" /><uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' if location_enabled else ""
          biometric_p = '<uses-permission android:name="android.permission.USE_BIOMETRIC" />' if biometric_enabled else ""
          orientation_mode = "portrait" if screen_rotation == "portrait" else "landscape" if screen_rotation == "landscape" else "unspecified"

          manifest_template = """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="__PACKAGE_ID__">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              {camera_p}
              {audio_p}
              {notif_p}
              {storage_p}
              {location_p}
              {biometric_p}
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|layoutDirection|fontScale|screenLayout|density"
                      android:name="{package_id}.MainActivity"
                      android:label="@string/title_activity_main"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:screenOrientation="{orientation}"
                      android:theme="@style/AppTheme.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          """.format(package_id=package_id, camera_p=camera_p, audio_p=audio_p, notif_p=notif_p, storage_p=storage_p, location_p=location_p, biometric_p=biometric_p, orientation=orientation_mode)
          
          with open("android/app/src/main/AndroidManifest.xml", "w") as f:
              f.write(manifest_template)

          # Build package structure and write main activity code
          package_path = package_id.replace(".", "/")
          java_dir = f"android/app/src/main/java/{package_path}"
          os.makedirs(java_dir, exist_ok=True)

          # Bridge Activity linking legacy web bridges with Capacitor core web views
          main_activity_java = f"""package {package_id};
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {{}}
          """
          with open(f"{java_dir}/MainActivity.java", "w") as f:
              f.write(main_activity_java)
              
          # Setup custom launcher icon using Pillow if assets available
          icon_src = "www/_app_icon.png"
          if os.path.exists(icon_src):
              sizes = {
                  "mipmap-mdpi": 48,
                  "mipmap-hdpi": 72,
                  "mipmap-xhdpi": 96,
                  "mipmap-xxhdpi": 144,
                  "mipmap-xxxhdpi": 192
              }
              try:
                  with Image.open(icon_src) as img:
                      for folder, size in sizes.items():
                          dest_dir = f"android/app/src/main/res/{folder}"
                          os.makedirs(dest_dir, exist_ok=True)
                          resized_img = img.resize((size, size), Image.Resampling.LANCZOS)
                          resized_img.save(f"{dest_dir}/ic_launcher.png")
              except Exception as e:
                  print(f"Error compiling custom launcher icon: {e}")
          EOF
          python3 build_assets.py

      - name: Sync Web Directory and Plugins to Android Template
        run: |
          echo "Running Capacitor Sync..."
          npx cap sync android

      - name: Run Debug APK Compilation Task
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Package Debug APK with Credits Document
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          cat << 'EOF' > android/app/build/outputs/apk/debug/credits.txt
          ==================================================
          HopFile Editor - Build Package
          ==================================================
          This package was generated dynamically by HopFile Editor Workspace.

          Credits:
          HopFile Editor is designed, developed, and maintained by tuik.
          All rights reserved.

          Thank you for choosing HopFile Editor as your Mobile IDE & Compiler!
          ==================================================
          EOF
          
          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk $APK_NAME
          zip -r $ZIP_NAME $APK_NAME credits.txt

      - name: Generate Dynamic Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          TAG="release-${CLEANED_NAME}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Artifact Target
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package build generated via HopFile Editor (Capacitor 6 Engine).
            - **Package ID:** `${{ env.PACKAGE_ID }}`
            - **Build ID:** `${{ github.run_number }}`
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload ZIP
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary build payload [skip ci]" || true
          git push origin main || git push origin master || true
