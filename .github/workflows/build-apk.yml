name: Build APK (Capacitor, Debug)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Licenses Auto-Accept)
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Extract web payload into www/
        run: |
          mkdir -p www
          if [ ! -f "${ZIP_NAME}" ]; then
            echo "ERROR: ${ZIP_NAME} not found in repository!"
            exit 1
          fi
          unzip -o "${ZIP_NAME}" -d www/

          if [ ! -f www/index.html ] && [ ! -f www/index.php ]; then
            echo "Index file not found in www root. Checking subdirectories..."
            SUBDIR=$(find www/ -name "index.html" -o -name "index.php" -print -quit | sed 's|/index.html||' | sed 's|/index.php||')
            if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "www" ]; then
              echo "Found index in directory: $SUBDIR. Flattening contents..."
              mv "$SUBDIR"/* www/
            else
              echo "WARNING: index file not found in payload!"
            fi
          fi

      - name: Init package.json and install Capacitor + plugins
        run: |
          cat << EOF > package.json
          {
            "name": "hopfile-app",
            "version": "${VERSION_NAME}",
            "private": true,
            "dependencies": {}
          }
          EOF

          npm install \
            @capacitor/core \
            @capacitor/cli \
            @capacitor/android \
            @capacitor/preferences \
            @capacitor/filesystem \
            @capacitor/camera \
            @capacitor/geolocation \
            @capacitor/share \
            @capacitor/app \
            @capacitor-community/text-to-speech \
            @capacitor-community/speech-recognition

      - name: Generate capacitor.config.json
        run: |
          cat << EOF > capacitor.config.json
          {
            "appId": "${PACKAGE_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "allowMixedContent": false,
              "captureInput": true
            }
          }
          EOF

      - name: Add Android platform and sync plugins
        run: |
          npx cap add android
          npx cap sync android

      - name: Write app name / package strings
        run: |
          cat << EOF > android/app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">${APP_NAME}</string>
              <string name="title_activity_main">${APP_NAME}</string>
              <string name="package_name">${PACKAGE_ID}</string>
              <string name="custom_url_scheme">${PACKAGE_ID}</string>
          </resources>
          EOF

      - name: Developer Mode Compilation Log Summary
        run: |
          echo "### Generated Android Manifest" >> $GITHUB_STEP_SUMMARY
          echo '```xml' >> $GITHUB_STEP_SUMMARY
          cat android/app/src/main/AndroidManifest.xml >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run APK Compile Gradle Task (Debug, unsigned-release-free)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Package APK into ZIP and Rename
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_OUT="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"

          cat << 'EOF' > android/app/build/outputs/apk/debug/credits.txt
          ==================================================
          HopFile Editor - Capacitor Debug Build
          ==================================================
          Built via Capacitor (no release keystore configured).
          Debug-signed APK 鈥� fine for sideload installs,
          not eligible for Play Store submission.
          ==================================================
          EOF

          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk "$APK_NAME"
          zip -r "$ZIP_OUT" "$APK_NAME" credits.txt

      - name: Generate Unique Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          TAG="release-${CLEANED_NAME}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Capacitor Android build for **${{ env.APP_NAME }}**
            - **Package ID:** `${{ env.PACKAGE_ID }}`
            - **Build ID:** `${{ github.run_number }}`
            - Debug-signed (no keystore) 鈥� sideload only.
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload zip from git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary build payload [skip ci]" || true
          git push origin main || git push origin master || true
