name: Build APK from Web Archive

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Initialize Android Web-View Wrapper Template
        run: |
          echo "Initializing lightweight Gradle project structure..."
          mkdir -p app/src/main/java/com/example/runner
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/jniLibs/arm64-v8a
          
          echo "org.gradle.java.home=${JAVA_HOME}" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.bundle.enableUncompressedNativeLibs=false" >> gradle.properties
          
          cat << 'EOF' > settings.gradle
          rootProject.name = 'WebRunner'
          include ':app'
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Fetch Website Archive and Clean Assets
        run: |
          echo "Verifying local web workspace ZIP archive inside repository..."
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          
          echo "Extracting workspace targets deep into assets folder..."
          unzip -o "${ZIP_NAME}" -d app/src/main/assets/
          
          if [ ! -f app/src/main/assets/index.html ] && [ ! -f app/src/main/assets/index.php ]; then
              echo "Index file not found in assets root. Checking subdirectories..."
              SUBDIR=$(find app/src/main/assets/ -name "index.html" -o -name "index.php" -print -quit | sed 's|/index.html||' | sed 's|/index.php||')
              if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "app/src/main/assets" ]; then
                  echo "Found index in directory: $SUBDIR. Flattening contents..."
                  mv "$SUBDIR"/* app/src/main/assets/
              else
                  echo "WARNING: index file not found in package payload!"
              fi
          fi

      - name: Fetch and Bundle Native PHP 8.4 Binary for Android ARM64
        run: |
          echo "Downloading PocketMine PHP 8.4 static binary for Android arm64..."
          wget -q https://github.com/pmmp/PHP-Binaries/releases/download/pm5-php-8.4-latest/PHP-8.4-Android-arm64-PM5.tar.gz -O php.tar.gz
          
          mkdir php_bin
          tar -xzf php.tar.gz -C php_bin
          
          PHP_BIN_PATH=$(find php_bin -name "php" -type f -print -quit)
          if [ -n "$PHP_BIN_PATH" ]; then
              cp "$PHP_BIN_PATH" app/src/main/jniLibs/arm64-v8a/libphp.so
              echo "Successfully packed ARM64 PHP binary from $PHP_BIN_PATH to libphp.so."
          else
              echo "ERROR: PHP binary could not be found in tarball!"
              exit 1
          fi

      - name: Generate Native Android Code from app_config.json
        run: |
          python3 -m pip install Pillow --break-system-packages
          
          cat << 'EOF' > build_assets.py
          import json
          import os
          import urllib.request
          from PIL import Image

          config_path = "app/src/main/assets/app_config.json"
          config = {}
          if os.path.exists(config_path):
              with open(config_path, "r") as f:
                  config = json.load(f)

          app_name = config.get("appName", os.environ.get("APP_NAME", "My App"))
          package_id = config.get("packageName", os.environ.get("PACKAGE_ID", "com.example.runner"))
          version_name = config.get("versionName", os.environ.get("VERSION_NAME", "1.0.0"))
          version_code = int(config.get("versionCode", os.environ.get("VERSION_CODE", "1")))
          theme_color = config.get("themeColor", "#4F46E5")
          homepage = config.get("homepage", "index.html")
          screen_rotation = config.get("screenRotation", "auto")
          splash_bg_color = config.get("splashBgColor", "#111827")
          splash_duration = int(config.get("splashDuration", 2000))

          database_enabled = config.get("databaseEnabled", True)
          camera_enabled = config.get("cameraEnabled", True)
          notifications_enabled = config.get("notificationsEnabled", True)
          local_storage_enabled = config.get("localStorageEnabled", True)
          fullscreen_enabled = config.get("fullscreenEnabled", True)
          autoplay_enabled = config.get("autoplayEnabled", True)
          microphone_enabled = config.get("microphoneEnabled", True)
          hide_title_bar = config.get("hideTitleBar", True)
          swipe_refresh_enabled = config.get("swipeRefreshEnabled", True)
          long_press_enabled = config.get("longPressEnabled", True)
          loading_ui_enabled = config.get("loadingUIEnabled", True)
          pc_mode_enabled = config.get("pcModeEnabled", False)
          zoom_enabled = config.get("zoomEnabled", True)
          has_custom_splash = config.get("hasCustomSplash", False)
          php_port = int(config.get("phpPort", 8080))
          location_enabled = config.get("locationEnabled", True)
          clipboard_enabled = config.get("clipboardEnabled", True)
          keep_screen_on_enabled = config.get("keepScreenOnEnabled", True)
          secure_window_enabled = config.get("secureWindowEnabled", False)
          external_browser_enabled = config.get("externalBrowserEnabled", True)
          file_transfer_enabled = config.get("fileTransferEnabled", True)
          double_back_exit_enabled = config.get("doubleBackExitEnabled", True)
          biometric_enabled = config.get("biometricEnabled", False)
          splash_screen_enabled = config.get("splashScreenEnabled", False)

          has_php_files = False
          assets_dir = "app/src/main/assets"
          for root, dirs, files in os.walk(assets_dir):
              for file in files:
                  if file.endswith(".php"):
                      has_php_files = True
                      break
              if has_php_files:
                  break

          php_support = config.get("phpSupport", True) and has_php_files

          app_build_gradle_template = """
          apply plugin: 'com.android.application'
          android {
              namespace 'com.example.runner'
              compileSdk 34
              defaultConfig {
                  applicationId "__PACKAGE_ID__"
                  minSdk 24
                  targetSdk 34
                  versionCode __VERSION_CODE__
                  versionName "__VERSION_NAME__"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          dependencies {
              implementation 'androidx.webkit:webkit:1.6.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.media:media:1.6.0'
              implementation 'androidx.biometric:biometric:1.1.0'
          }
          """
          app_build_gradle = app_build_gradle_template.replace("__PACKAGE_ID__", package_id)
          app_build_gradle = app_build_gradle.replace("__VERSION_CODE__", str(version_code))
          app_build_gradle = app_build_gradle.replace("__VERSION_NAME__", version_name)
          
          with open("app/build.gradle", "w") as f:
              f.write(app_build_gradle.strip())

          colors_xml_template = """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">__THEME_COLOR__</color>
              <color name="colorPrimaryDark">__THEME_COLOR__</color>
              <color name="colorAccent">__THEME_COLOR__</color>
              <color name="splashBg">__SPLASH_BG_COLOR__</color>
          </resources>
          """
          colors_xml = colors_xml_template.replace("__THEME_COLOR__", theme_color).replace("__SPLASH_BG_COLOR__", splash_bg_color)
          with open("app/src/main/res/values/colors.xml", "w") as f:
              f.write(colors_xml.strip())

          theme_style_parent = "Theme.AppCompat.Light.NoActionBar"
          theme_items = ""
          if fullscreen_enabled:
              theme_items = """<item name="android:windowFullscreen">true</item>
              <item name="android:windowNoTitle">true</item>"""
          elif hide_title_bar:
              theme_items = """<item name="android:windowNoTitle">true</item>"""
          else:
              theme_style_parent = "Theme.AppCompat.Light.DarkActionBar"

          styles_xml_template = """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="SplashTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/splashBg</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
              <style name="AppTheme" parent="__THEME_STYLE_PARENT__">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
                  __THEME_ITEMS__
              </style>
          </resources>
          """
          styles_xml = styles_xml_template.replace("__THEME_STYLE_PARENT__", theme_style_parent).replace("__THEME_ITEMS__", theme_items)
          with open("app/src/main/res/values/styles.xml", "w") as f:
              f.write(styles_xml.strip())

          custom_notification_xml = """<?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="64dp"
              android:orientation="horizontal"
              android:padding="8dp"
              android:background="#1E293B">
              <ImageView
                  android:id="@+id/custom_icon"
                  android:layout_width="48dp"
                  android:layout_height="48dp"
                  android:src="@mipmap/ic_launcher"
                  android:layout_gravity="center_vertical"/>
              <LinearLayout
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:layout_weight="1"
                  android:orientation="vertical"
                  android:layout_marginLeft="12dp"
                  android:layout_gravity="center_vertical">
                  <TextView
                      android:id="@+id/custom_title"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Custom Title"
                      android:textColor="#F8FAFC"
                      android:textSize="14sp"
                      android:textStyle="bold"/>
                  <TextView
                      android:id="@+id/custom_text"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Custom Message Body"
                      android:textColor="#94A3B8"
                      android:textSize="12sp"/>
              </LinearLayout>
          </LinearLayout>
          """
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          with open("app/src/main/res/layout/custom_notification.xml", "w") as f:
              f.write(custom_notification_xml.strip())

          os.makedirs("app/src/main/res/drawable", exist_ok=True)
          
          def write_vector(filename, path_data, viewport="24"):
              xml = f"""<vector xmlns:android="http://schemas.android.com/apk/res/android"
                  android:width="24dp"
                  android:height="24dp"
                  android:viewportWidth="{viewport}"
                  android:viewportHeight="{viewport}">
                  <path android:fillColor="?android:attr/textColorPrimary" android:pathData="{path_data}"/>
              </vector>"""
              with open(f"app/src/main/res/drawable/{filename}.xml", "w") as f_out:
                  f_out.write(xml.strip())

          write_vector("ic_notification_prev", "M6,18V6h2v12H6z M9.5,12l8.5,6V6L9.5,12z")
          write_vector("ic_notification_play", "M8,5v14l11-7L8,5z")
          write_vector("ic_notification_pause", "M6,19h4V5H6V19z M14,5v14h4V5H14z")
          write_vector("ic_notification_next", "M6,18l8.5-6L6,6V18z M16,6v12h2V6H16z")
          write_vector("ic_notification_stop", "M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41z")
          write_vector("ic_notification_rewind", "M11,18V6l-8.5,6L11,18z M11.5,12l8.5,6V6L11.5,12z")
          write_vector("ic_notification_fast_forward", "M13,6v12l8.5-6L13,6z M12.5,12l-8.5,6V6L12.5,12z")
          write_vector("ic_notification_code", "M9.4,16.6L4.8,12l4.6-4.6L8,6l-6,6l6,6L9.4,16.6z M14.6,16.6l4.6-4.6l-4.6-4.6L16,6l6,6l-6,6L14.6,16.6z", "24")

          bg_tuik_badge_xml = """<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#232B3E" />
              <corners android:radius="16dp" />
          </shape>"""
          with open("app/src/main/res/drawable/bg_tuik_badge.xml", "w") as f:
              f.write(bg_tuik_badge_xml.strip())

          custom_media_collapsed_xml = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/notification_root"
              android:layout_width="match_parent"
              android:layout_height="80dp"
              android:padding="8dp"
              android:clickable="true"
              android:focusable="true">
              <ImageView
                  android:id="@+id/media_album_art"
                  android:layout_width="52dp"
                  android:layout_height="52dp"
                  android:scaleType="centerCrop"
                  android:layout_alignParentLeft="true"
                  android:layout_centerVertical="true"
                  android:layout_marginLeft="4dp"/>
              <LinearLayout
                  android:id="@+id/metadata_layout"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:layout_toRightOf="@id/media_album_art"
                  android:layout_toLeftOf="@+id/media_controls_layout"
                  android:layout_centerVertical="true"
                  android:layout_marginLeft="10dp"
                  android:layout_marginRight="10dp">
                  <TextView
                      android:id="@+id/media_track_title"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Track Title"
                      android:textColor="?android:attr/textColorPrimary"
                      android:textSize="13sp"
                      android:textStyle="bold"
                      android:ellipsize="end"
                      android:singleLine="true"/>
                  <LinearLayout
                      android:id="@+id/tuik_badge"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:background="@drawable/bg_tuik_badge"
                      android:paddingLeft="8dp"
                      android:paddingRight="8dp"
                      android:paddingTop="3dp"
                      android:paddingBottom="3dp"
                      android:layout_marginTop="4dp"
                      android:gravity="center_vertical"
                      android:clickable="true"
                      android:focusable="true">
                      <ImageView
                          android:layout_width="10dp"
                          android:layout_height="10dp"
                          android:src="@drawable/ic_notification_code"
                          android:layout_marginRight="4dp"/>
                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Tuik"
                          android:textColor="#F8FAFC"
                          android:textSize="9sp"
                          android:textStyle="bold"/>
                  </LinearLayout>
              </LinearLayout>
              <LinearLayout
                  android:id="@+id/media_controls_layout"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_alignParentRight="true"
                  android:layout_centerVertical="true"
                  android:layout_marginRight="4dp"
                  android:gravity="center">
                  <ImageButton
                      android:id="@+id/btn_prev"
                      android:layout_width="28dp"
                      android:layout_height="28dp"
                      android:src="@drawable/ic_notification_prev"
                      android:background="?android:attr/selectableItemBackgroundBorderless"
                      android:contentDescription="Previous"/>
                  <ImageButton
                      android:id="@+id/btn_play_pause"
                      android:layout_width="32dp"
                      android:layout_height="32dp"
                      android:src="@drawable/ic_notification_pause"
                      android:background="?android:attr/selectableItemBackgroundBorderless"
                      android:contentDescription="Play/Pause"
                      android:layout_marginLeft="6dp"
                      android:layout_marginRight="6dp"/>
                  <ImageButton
                      android:id="@+id/btn_next"
                      android:layout_width="28dp"
                      android:layout_height="28dp"
                      android:src="@drawable/ic_notification_next"
                      android:background="?android:attr/selectableItemBackgroundBorderless"
                      android:contentDescription="Next"/>
              </LinearLayout>
              <ProgressBar
                  android:id="@+id/custom_media_progress"
                  style="?android:attr/progressBarStyleHorizontal"
                  android:layout_width="match_parent"
                  android:layout_height="3dp"
                  android:layout_alignParentBottom="true"
                  android:progressDrawable="@android:drawable/progress_horizontal"
                  android:progressTint="?android:attr/colorAccent"
                  android:progressBackgroundTint="?android:attr/textColorSecondary"
                  android:max="100"
                  android:progress="0"/>
          </RelativeLayout>
          """
          with open("app/src/main/res/layout/custom_media_collapsed.xml", "w") as f:
              f.write(custom_media_collapsed_xml.strip())

          custom_media_expanded_xml = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/notification_root_large"
              android:layout_width="match_parent"
              android:layout_height="144dp"
              android:padding="12dp"
              android:clickable="true"
              android:focusable="true">
              <ImageView
                  android:id="@+id/media_album_art_large"
                  android:layout_width="64dp"
                  android:layout_height="64dp"
                  android:scaleType="centerCrop"
                  android:layout_alignParentLeft="true"
                  android:layout_alignParentTop="true"/>
              <LinearLayout
                  android:id="@+id/details_layout"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:layout_toRightOf="@id/media_album_art_large"
                  android:layout_marginLeft="14dp"
                  android:layout_alignParentTop="true"
                  android:layout_toLeftOf="@+id/btn_stop">
                  <TextView
                      android:id="@+id/media_track_title_large"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Track Title"
                      android:textColor="?android:attr/textColorPrimary"
                      android:textSize="14sp"
                      android:textStyle="bold"
                      android:ellipsize="end"
                      android:singleLine="true"/>
                  <LinearLayout
                      android:id="@+id/tuik_badge_large"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:background="@drawable/bg_tuik_badge"
                      android:paddingLeft="8dp"
                      android:paddingRight="8dp"
                      android:paddingTop="3dp"
                      android:paddingBottom="3dp"
                      android:layout_marginTop="4dp"
                      android:gravity="center_vertical"
                      android:clickable="true"
                      android:focusable="true">
                      <ImageView
                          android:layout_width="10dp"
                          android:layout_height="10dp"
                          android:src="@drawable/ic_notification_code"
                          android:layout_marginRight="4dp"/>
                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Tuik"
                          android:textColor="#F8FAFC"
                          android:textSize="9sp"
                          android:textStyle="bold"/>
                  </LinearLayout>
              </LinearLayout>
              <ImageButton
                  android:id="@+id/btn_stop"
                  android:layout_width="28dp"
                  android:layout_height="28dp"
                  android:src="@drawable/ic_notification_stop"
                  android:background="?android:attr/selectableItemBackgroundBorderless"
                  android:layout_alignParentRight="true"
                  android:layout_alignParentTop="true"/>
              <LinearLayout
                  android:id="@+id/timeline_layout"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_below="@id/media_album_art_large"
                  android:layout_marginTop="12dp"
                  android:gravity="center_vertical">
                  <TextView
                      android:id="@+id/txt_current_time"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="0:00"
                      android:textColor="?android:attr/textColorSecondary"
                      android:textSize="10sp"/>
                  <ProgressBar
                      android:id="@+id/custom_media_progress_large"
                      style="?android:attr/progressBarStyleHorizontal"
                      android:layout_width="0dp"
                      android:layout_height="4dp"
                      android:layout_weight="1"
                      android:layout_marginLeft="8dp"
                      android:layout_marginRight="8dp"
                      android:progressTint="?android:attr/colorAccent"
                      android:progressBackgroundTint="?android:attr/textColorSecondary"
                      android:max="100"
                      android:progress="0"/>
                  <TextView
                      android:id="@+id/txt_total_duration"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="0:00"
                      android:textColor="?android:attr/textColorSecondary"
                      android:textSize="10sp"/>
              </LinearLayout>
              <LinearLayout
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_below="@id/timeline_layout"
                  android:layout_centerHorizontal="true"
                  android:layout_marginTop="8dp"
                  android:gravity="center">
                  <ImageButton
                      android:id="@+id/btn_prev_large"
                      android:layout_width="32dp"
                      android:layout_height="32dp"
                      android:src="@drawable/ic_notification_prev"
                      android:background="?android:attr/selectableItemBackgroundBorderless"
                      android:contentDescription="Previous"/>
                  <ImageButton
                      android:id="@+id/btn_rewind_large"
                      android:layout_width="32dp"
                      android:layout_height="32dp"
                      android:src="@drawable/ic_notification_rewind"
                      android:background="?android:attr/selectableItemBackgroundBorderless"
                      android:layout_marginLeft="10dp"
                      android:contentDescription="Rewind"/>
                  <ImageButton
                      android:id="@+id/btn_play_pause_large"
                      android:layout_width="36dp"
                      android:layout_height="36dp"
                      android:src="@drawable/ic_notification_pause"
                      android:background="?android:attr/selectableItemBackgroundBorderless"
                      android:contentDescription="Play/Pause"
                      android:layout_marginLeft="14dp"
                      android:layout_marginRight="14dp"/>
                  <ImageButton
                      android:id="@+id/btn_fast_forward_large"
                      android:layout_width="32dp"
                      android:layout_height="32dp"
                      android:src="@drawable/ic_notification_fast_forward"
                      android:background="?android:attr/selectableItemBackgroundBorderless"
                      android:layout_marginRight="10dp"
                      android:contentDescription="Fast Forward"/>
                  <ImageButton
                      android:id="@+id/btn_next_large"
                      android:layout_width="32dp"
                      android:layout_height="32dp"
                      android:src="@drawable/ic_notification_next"
                      android:background="?android:attr/selectableItemBackgroundBorderless"
                      android:contentDescription="Next"/>
              </LinearLayout>
          </RelativeLayout>
          """
          with open("app/src/main/res/layout/custom_media_expanded.xml", "w") as f:
              f.write(custom_media_expanded_xml.strip())

          splash_src_drawable = "@drawable/splash_icon" if has_custom_splash else "@mipmap/ic_launcher"
          activity_splash_xml_template = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/splashBg">
              <ImageView
                  android:id="@+id/splash_logo"
                  android:layout_width="160dp"
                  android:layout_height="160dp"
