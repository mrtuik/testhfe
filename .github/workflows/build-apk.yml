name: Build APK with Capacitor

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}
      # AdMob App ID — override with your real one via repo variable ADMOB_APP_ID
      ADMOB_APP_ID: ${{ vars.ADMOB_APP_ID || 'ca-app-pub-3940256099942544~3347511713' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Fetch Website Archive and Verify Assets
        run: |
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          mkdir -p raw_assets
          unzip -o "${ZIP_NAME}" -d raw_assets/
          if [ ! -f raw_assets/app_config.json ]; then
              echo '{"appName":"'"$APP_NAME"'","packageName":"'"$PACKAGE_ID"'","versionName":"'"$VERSION_NAME"'","versionCode":'"$VERSION_CODE"'}' > raw_assets/app_config.json
          fi

      - name: Write package.json (Capacitor 6 aligned plugins)
        run: |
          cat << 'EOF' > package.json
          {
            "name": "webrunner",
            "version": "1.0.0",
            "description": "Capacitor 6 App built with HopFile Editor",
            "dependencies": {
              "@capacitor/core": "^6.2.0",
              "@capacitor/android": "^6.2.0",
              "@capacitor/app": "^6.0.2",
              "@capacitor/app-launcher": "^6.0.2",
              "@capacitor/action-sheet": "^6.0.2",
              "@capacitor/browser": "^6.0.3",
              "@capacitor/camera": "^6.1.2",
              "@capacitor/clipboard": "^6.0.2",
              "@capacitor/device": "^6.0.2",
              "@capacitor/dialog": "^6.0.2",
              "@capacitor/filesystem": "^6.0.3",
              "@capacitor/geolocation": "^6.1.0",
              "@capacitor/haptics": "^6.0.2",
              "@capacitor/keyboard": "^6.0.3",
              "@capacitor/local-notifications": "^6.2.0",
              "@capacitor/motion": "^6.0.2",
              "@capacitor/network": "^6.0.3",
              "@capacitor/preferences": "^6.0.3",
              "@capacitor/push-notifications": "^6.0.4",
              "@capacitor/share": "^6.0.3",
              "@capacitor/splash-screen": "^6.0.3",
              "@capacitor/status-bar": "^6.0.2",
              "@capacitor/text-zoom": "^6.0.2",
              "@capacitor/toast": "^6.0.3",
              "@capacitor-community/admob": "^6.0.0",
              "@capacitor-community/apple-sign-in": "^6.0.0",
              "@capacitor-community/bluetooth-le": "^6.0.1",
              "@capacitor-community/camera-preview": "^6.0.0",
              "@capacitor-community/contacts": "^6.0.1",
              "@capacitor-community/keep-awake": "^6.0.0",
              "@capacitor-community/media": "^6.0.0",
              "@capacitor-community/sqlite": "^6.0.2",
              "@capacitor-community/text-to-speech": "^6.0.0",
              "@capacitor-community/speech-recognition": "^6.0.0",
              "@capacitor-community/background-geolocation": "^1.2.21",
              "capacitor-music-controls-plugin": "^3.0.6",
              "@capawesome/capacitor-app-update": "^6.0.1",
              "@capawesome/capacitor-app-shortcuts": "^6.0.1",
              "@capawesome/capacitor-badge": "^6.0.1",
              "@capawesome/capacitor-file-picker": "^6.2.0",
              "@capawesome/capacitor-file-opener": "^6.0.2",
              "@capawesome/capacitor-mlkit-barcode-scanning": "^6.0.0",
              "@capawesome/capacitor-nfc": "^6.0.1",
              "@capawesome/capacitor-screen-orientation": "^6.0.1",
              "@capawesome-team/capacitor-android-foreground-service": "^6.1.0",
              "@capacitor-firebase/authentication": "^6.1.0",
              "@capacitor-firebase/messaging": "^6.1.0",
              "@capacitor-firebase/firestore": "^6.1.0",
              "@capgo/capacitor-updater": "^6.5.0",
              "@capgo/native-audio": "^6.2.1",
              "@capgo/capacitor-native-biometric": "^6.0.0",
              "@capgo/inappreview": "^6.0.0",
              "@capgo/capacitor-social-login": "^6.0.0",
              "@transistorsoft/capacitor-background-fetch": "^6.0.0",
              "capacitor-native-settings": "^6.0.0",
              "capacitor-video-player": "^6.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.2.0"
            }
          }
          EOF
          npm install --legacy-peer-deps

      - name: Initialize Capacitor 6 Project
        run: |
          APP_NAME_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').appName || '$APP_NAME')")
          PACKAGE_ID_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').packageName || '$PACKAGE_ID')")
          npx cap init "$APP_NAME_CONFIG" "$PACKAGE_ID_CONFIG" --web-dir=www
          mkdir -p www
          cp -r raw_assets/* www/
          npx cap add android

      - name: Decode google-services.json (FCM / Firebase)
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
          echo "google-services.json placed."

      - name: Clean Default Java Sources
        run: rm -rf android/app/src/main/java/*

      - name: Inject Native Config, Manifest, Gradle, Resources
        env:
          ADMOB_APP_ID: ${{ env.ADMOB_APP_ID }}
        run: |
          python3 -m pip install --quiet Pillow
          cat << 'PYEOF' > build_assets.py
          import json, os
          config_path = "www/app_config.json"
          config = json.load(open(config_path)) if os.path.exists(config_path) else {}

          app_name      = config.get("appName", os.environ.get("APP_NAME", "My App"))
          package_id    = config.get("packageName", os.environ.get("PACKAGE_ID", "com.example.runner"))
          version_name  = config.get("versionName", os.environ.get("VERSION_NAME", "1.0.0"))
          version_code  = int(config.get("versionCode", os.environ.get("VERSION_CODE", "1")))
          theme_color   = config.get("themeColor", "#4F46E5")
          splash_bg     = config.get("splashBgColor", "#111827")
          screen_rot    = config.get("screenRotation", "auto")
          admob_app_id  = os.environ.get("ADMOB_APP_ID", "ca-app-pub-3940256099942544~3347511713")
          has_firebase  = os.path.exists("android/app/google-services.json")

          camera_enabled        = config.get("cameraEnabled", True)
          notifications_enabled = config.get("notificationsEnabled", True)
          microphone_enabled    = config.get("microphoneEnabled", True)
          location_enabled      = config.get("locationEnabled", False)
          biometric_enabled     = config.get("biometricEnabled", True)
          storage_enabled       = config.get("localStorageEnabled", True) or config.get("fileTransferEnabled", True)
          bg_audio_enabled      = config.get("backgroundAudioEnabled", True)

          # ---------- Root build.gradle: add google-services classpath ----------
          root_gradle = "android/build.gradle"
          if os.path.exists(root_gradle):
              txt = open(root_gradle).read()
              if has_firebase and "com.google.gms:google-services" not in txt:
                  txt = txt.replace(
                      "dependencies {",
                      "dependencies {\n        classpath 'com.google.gms:google-services:4.4.2'",
                      1,
                  )
                  open(root_gradle, "w").write(txt)

          # ---------- app/build.gradle ----------
          gs_apply = "apply plugin: 'com.google.gms.google-services'" if has_firebase else ""
          app_gradle = f"""apply plugin: 'com.android.application'
          {gs_apply}

          android {{
              namespace '{package_id}'
              compileSdk 35
              defaultConfig {{
                  applicationId "{package_id}"
                  minSdk 24
                  targetSdk 35
                  versionCode {version_code}
                  versionName "{version_name}"
              }}
              compileOptions {{
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }}
              buildTypes {{
                  release {{
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }}
                  debug {{ minifyEnabled false }}
              }}
          }}

          dependencies {{
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
              implementation 'androidx.webkit:webkit:1.11.0'
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'androidx.media:media:1.7.0'
              implementation 'androidx.biometric:biometric:1.1.0'
              implementation 'com.google.android.gms:play-services-ads:23.2.0'
          }}
          """
          open("android/app/build.gradle", "w").write(app_gradle)

          # ---------- res/values ----------
          os.makedirs("android/app/src/main/res/values", exist_ok=True)
          open("android/app/src/main/res/values/colors.xml", "w").write(f"""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">{theme_color}</color>
              <color name="colorPrimaryDark">{theme_color}</color>
              <color name="colorAccent">{theme_color}</color>
              <color name="splashBg">{splash_bg}</color>
          </resources>""")

          open("android/app/src/main/res/values/styles.xml", "w").write("""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>""")

          open("android/app/src/main/res/values/strings.xml", "w").write(f"""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">{app_name}</string>
              <string name="title_activity_main">{app_name}</string>
              <string name="package_name">{package_id}</string>
          </resources>""")

          # ---------- Manifest ----------
          perms = ['<uses-permission android:name="android.permission.INTERNET" />',
                   '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
                   '<uses-permission android:name="android.permission.WAKE_LOCK" />',
                   '<uses-permission android:name="com.google.android.gms.permission.AD_ID" />']
          if camera_enabled:        perms.append('<uses-permission android:name="android.permission.CAMERA" />')
          if microphone_enabled:    perms += ['<uses-permission android:name="android.permission.RECORD_AUDIO" />',
                                              '<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />']
          if notifications_enabled: perms += ['<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
                                              '<uses-permission android:name="android.permission.VIBRATE" />']
          if bg_audio_enabled:      perms += ['<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />',
                                              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />']
          if storage_enabled:       perms += ['<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />',
                                              '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />',
                                              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />',
                                              '<uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />',
                                              '<uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />']
          if location_enabled:      perms += ['<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
                                              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />']
          if biometric_enabled:     perms.append('<uses-permission android:name="android.permission.USE_BIOMETRIC" />')

          orientation = "portrait" if screen_rot == "portrait" else "landscape" if screen_rot == "landscape" else "unspecified"
          perms_xml = "\n    ".join(perms)

          bg_service = ''
          if bg_audio_enabled:
              bg_service = '''
              <service
                  android:name="com.capawesome.capacitorjs.plugins.foregroundservice.AndroidForegroundService"
                  android:foregroundServiceType="mediaPlayback"
                  android:exported="false" />'''

          manifest = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              {perms_xml}
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/AppTheme">

                  <meta-data
                      android:name="com.google.android.gms.ads.APPLICATION_ID"
                      android:value="{admob_app_id}" />

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|layoutDirection|fontScale|screenLayout|density"
                      android:name="{package_id}.MainActivity"
                      android:label="@string/title_activity_main"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:screenOrientation="{orientation}"
                      android:theme="@style/AppTheme.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  {bg_service}
              </application>
          </manifest>
          """
          open("android/app/src/main/AndroidManifest.xml", "w").write(manifest)

          # ---------- MainActivity.java ----------
          pkg_path = package_id.replace(".", "/")
          java_dir = f"android/app/src/main/java/{pkg_path}"
          os.makedirs(java_dir, exist_ok=True)
          open(f"{java_dir}/MainActivity.java", "w").write(
              f"package {package_id};\nimport com.getcapacitor.BridgeActivity;\npublic class MainActivity extends BridgeActivity {{}}\n"
          )
          print("Native config injection complete.")
          PYEOF
          python3 build_assets.py

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Package APK with credits
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_OUT="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          cat << 'EOF' > android/app/build/outputs/apk/debug/credits.txt
          HopFile Editor - Capacitor 6 Build
          Generated automatically. All rights reserved.
          EOF
          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk "$APK_NAME"
          zip -r "$ZIP_OUT" "$APK_NAME" credits.txt

      - name: Generate Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          echo "TAG_NAME=release-${CLEANED_NAME}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package — Capacitor 6 aligned build.
            - Package ID: `${{ env.PACKAGE_ID }}`
            - Build #: `${{ github.run_number }}`
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup payload ZIP
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: cleanup build payload [skip ci]" || true
          git push || true
