name: Build APK from Web Archive (Capacitor 6)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (For Capacitor)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract User Web Payload
        run: |
          echo "Extracting payload..."
          mkdir -p www
          unzip -o "${ZIP_NAME}" -d www/
          
          # Checking where index.html is
          if [ ! -f www/index.html ] && [ ! -f www/index.php ]; then
              SUBDIR=$(find www/ -name "index.html" -o -name "index.php" -print -quit | sed 's|/index.html||' | sed 's|/index.php||')
              if [ -n "$SUBDIR" ]; then
                  mv "$SUBDIR"/* www/
              fi
          fi

      - name: Initialize Capacitor 6 Project
        run: |
          echo "Setting up Node environment & Capacitor..."
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # Initialize Capacitor with user's App Name and Package ID
          npx cap init "$APP_NAME" "$PACKAGE_ID" --web-dir www
          npx cap add android

          # Update capacitor.config.json for PHP server cleartext support
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "___PACKAGE_ID___",
            "appName": "___APP_NAME___",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "cleartext": true,
              "allowNavigation": ["*"]
            }
          }
          EOF
          sed -i "s/___PACKAGE_ID___/${PACKAGE_ID}/g" capacitor.config.json
          sed -i "s/___APP_NAME___/${APP_NAME}/g" capacitor.config.json

      - name: Install Native Plugins (AdMob, Splash, Media)
        run: |
          # Installing core native plugins
          npm install @capacitor/splash-screen @capacitor/app @capacitor/haptics @capacitor/keyboard @capacitor/status-bar
          
          # Optional Plugins (These will be triggered by JS in your frontend)
          npm install @capacitor-community/text-to-speech @capacitor-community/admob capacitor-music-controls-plugin
          
          # Sync plugins to Android
          npx cap sync android

      - name: Fetch PHP 8.4 Binary (PocketMine)
        run: |
          echo "Downloading PocketMine PHP 8.4 static binary for Android arm64..."
          wget -q https://github.com/pmmp/PHP-Binaries/releases/download/pm5-php-8.4-latest/PHP-8.4-Android-arm64-PM5.tar.gz -O php.tar.gz
          tar -xzf php.tar.gz
          
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          PHP_BIN_PATH=$(find . -name "php" -type f -print -quit)
          cp "$PHP_BIN_PATH" android/app/src/main/jniLibs/arm64-v8a/libphp.so

      - name: Modify MainActivity for PHP Server
        run: |
          # We inject a small code in Capacitor's MainActivity to start PHP
          MAIN_ACTIVITY_PATH=$(find android/app/src/main/java -name "MainActivity.java")
          
          # Python script to inject PHP server startup logic safely
          cat << 'EOF' > inject_php.py
          import sys
          file_path = sys.argv[1]
          with open(file_path, 'r') as f:
              code = f.read()
          
          import_statements = """
          import android.os.Bundle;
          import java.io.File;
          import java.io.InputStreamReader;
          import java.io.BufferedReader;
          """
          
          php_logic = """
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  startPhpServer();
              }

              private void startPhpServer() {
                  new Thread(() -> {
                      try {
                          String nativeDir = getApplicationInfo().nativeLibraryDir;
                          String phpBinary = nativeDir + "/libphp.so";
                          String docRoot = getApplicationContext().getFilesDir().getAbsolutePath() + "/public";
                          
                          // Capacitor copies 'www' to 'public' internally sometimes, or we serve directly
                          File binaryFile = new File(phpBinary);
                          if (binaryFile.exists()) binaryFile.setExecutable(true, false);

                          ProcessBuilder pb = new ProcessBuilder(phpBinary, "-S", "127.0.0.1:8080", "-t", docRoot);
                          pb.redirectErrorStream(true);
                          Process phpProcess = pb.start();
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }).start();
              }
          """
          
          code = code.replace("import com.getcapacitor.BridgeActivity;", "import com.getcapacitor.BridgeActivity;\n" + import_statements)
          code = code.replace("public class MainActivity extends BridgeActivity {}", "public class MainActivity extends BridgeActivity {\n" + php_logic + "\n}")
          
          with open(file_path, 'w') as f:
              f.write(code)
          EOF
          
          python3 inject_php.py "$MAIN_ACTIVITY_PATH"

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Package APK into ZIP
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk $APK_NAME
          zip -r $ZIP_NAME $APK_NAME

      - name: Generate Unique Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          echo "TAG_NAME=release-${CLEANED_NAME}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: "Automated Capacitor Native Build for **${{ env.APP_NAME }}**"
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload zip from git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary payload [skip ci]" || true
          git push origin main || git push origin master || true
