name: Build APK from Web Archive (Capacitor 6)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (For Capacitor)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract User Web Payload
        run: |
          echo "Extracting payload..."
          mkdir -p www
          unzip -o "${ZIP_NAME}" -d www/
          
          if [ ! -f www/index.html ] && [ ! -f www/index.php ]; then
              SUBDIR=$(find www/ -name "index.html" -o -name "index.php" -print -quit | sed 's|/index.html||' | sed 's|/index.php||')
              if [ -n "$SUBDIR" ]; then
                  mv "$SUBDIR"/* www/
              fi
          fi

      - name: Initialize Capacitor 6 Project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps
          
          npx cap init "$APP_NAME" "$PACKAGE_ID" --web-dir www
          npx cap add android

          cat << 'EOF' > capacitor.config.json
          {
            "appId": "___PACKAGE_ID___",
            "appName": "___APP_NAME___",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "cleartext": true,
              "allowNavigation": ["*"]
            }
          }
          EOF
          sed -i "s/___PACKAGE_ID___/${PACKAGE_ID}/g" capacitor.config.json
          sed -i "s/___APP_NAME___/${APP_NAME}/g" capacitor.config.json

      - name: Generate App Icons
        run: |
          npm install -g @capacitor/assets --legacy-peer-deps
          mkdir -p assets
          if [ -f "www/_app_icon.png" ]; then
            cp www/_app_icon.png assets/icon.png
          fi
          if [ -f "www/_splash_icon.png" ]; then
            cp www/_splash_icon.png assets/splash.png
          else
            cp assets/icon.png assets/splash.png || true
          fi
          if [ -f "assets/icon.png" ]; then
            npx capacitor-assets generate --android || echo "Icon generation skipped"
          fi

      - name: Install Native Plugins
        run: |
          npm install @capacitor/splash-screen @capacitor/app @capacitor/haptics @capacitor/keyboard @capacitor/status-bar --legacy-peer-deps
          npm install @capacitor-community/text-to-speech @capacitor-community/admob --legacy-peer-deps
          npx cap sync android

      - name: Configure Android Manifest & Permissions
        run: |
          cat << 'EOF' > modify_manifest.py
          import json, os
          config = {}
          if os.path.exists('www/app_config.json'):
              with open('www/app_config.json', 'r') as f:
                  config = json.load(f)
          
          admob_id = config.get('admobAppId', '').strip()
          if not admob_id:
              admob_id = 'ca-app-pub-3940256099942544~3347511713' # Google Test ID
              
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r') as f:
                  manifest = f.read()
              meta_tag = f'<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="{admob_id}"/>'
              if 'com.google.android.gms.ads.APPLICATION_ID' not in manifest:
                  manifest = manifest.replace('</application>', f'    {meta_tag}\n    </application>')
                  
              perms = [
                  '<uses-permission android:name="android.permission.INTERNET" />',
                  '<uses-permission android:name="android.permission.WAKE_LOCK" />',
                  '<uses-permission android:name="android.permission.RECORD_AUDIO" />',
                  '<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />',
                  '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />'
              ]
              for p in perms:
                  if p not in manifest:
                      manifest = manifest.replace('</manifest>', f'    {p}\n</manifest>')
                      
              with open(manifest_path, 'w') as f:
                  f.write(manifest)
          EOF
          python3 modify_manifest.py

      - name: Fetch PHP 8.4 Binary (PocketMine)
        run: |
          wget -q https://github.com/pmmp/PHP-Binaries/releases/download/pm5-php-8.4-latest/PHP-8.4-Android-arm64-PM5.tar.gz -O php.tar.gz || true
          if [ -s php.tar.gz ] && tar -tzf php.tar.gz >/dev/null 2>&1; then
              tar -xzf php.tar.gz
              mkdir -p android/app/src/main/jniLibs/arm64-v8a
              PHP_BIN_PATH=$(find . -name "php" -type f -print -quit)
              if [ -n "$PHP_BIN_PATH" ]; then
                  cp "$PHP_BIN_PATH" android/app/src/main/jniLibs/arm64-v8a/libphp.so
              fi
          else
              echo "PHP Binary missing or invalid archive. Skipping PHP compilation."
          fi

      - name: Modify MainActivity for PHP Server
        run: |
          MAIN_ACTIVITY_PATH=$(find android/app/src/main/java -name "MainActivity.java" | head -n 1)
          if [ -n "$MAIN_ACTIVITY_PATH" ]; then
            cat << 'EOF' > modify_activity.py
          import sys, re
          file_path = sys.argv[1]
          with open(file_path, 'r') as f:
              code = f.read()
          
          import_statements = "import android.os.Bundle;\nimport java.io.File;\n"
          
          php_logic = """
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  startPhpServer();
              }
          
              private void startPhpServer() {
                  new Thread(() -> {
                      try {
                          String nativeDir = getApplicationInfo().nativeLibraryDir;
                          String phpBinary = nativeDir + "/libphp.so";
                          String docRoot = getApplicationContext().getFilesDir().getAbsolutePath() + "/public";
                          
                          File binaryFile = new File(phpBinary);
                          if (binaryFile.exists()) binaryFile.setExecutable(true, false);
          
                          ProcessBuilder pb = new ProcessBuilder(phpBinary, "-S", "127.0.0.1:8080", "-t", docRoot);
                          pb.redirectErrorStream(true);
                          Process phpProcess = pb.start();
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }).start();
              }
          """
          code = code.replace('import com.getcapacitor.BridgeActivity;', 'import com.getcapacitor.BridgeActivity;\n' + import_statements)
          code = re.sub(r'public class MainActivity extends BridgeActivity\s*\{.*?\}', 'public class MainActivity extends BridgeActivity {\n' + php_logic + '\n}', code, flags=re.DOTALL)
          
          with open(file_path, 'w') as f:
              f.write(code)
          EOF
            python3 modify_activity.py "$MAIN_ACTIVITY_PATH" || echo "Activity modification failed but continuing."
          else
            echo "MainActivity.java not found. Skipping."
          fi

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Package APK into ZIP
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk $APK_NAME
          zip -r $ZIP_NAME $APK_NAME

      - name: Generate Unique Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          echo "TAG_NAME=release-${CLEANED_NAME}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: "Automated Capacitor Native Build for **${{ env.APP_NAME }}**"
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload zip from git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary payload [skip ci]" || true
          git push origin main || git push origin master || true
