                  @JavascriptInterface
                  public void triggerDynamicNotification(String jsonStr) {
                      try {
                          JSONObject json = new JSONObject(jsonStr);
                          int id = json.optInt("id", (int) System.currentTimeMillis());
                          String title = json.optString("title", "App Alert");
                          String message = json.optString("message", "");

                          if (json.optBoolean("foregroundService", false)) {
                              mContext.startForegroundTask("background_task", title, message);
                              return;
                          }

                          String channelId = json.optString("channelId", "default");
                          int importance = json.optInt("importance", 3);

                          NotificationCompat.Builder builder;
                          if (channelId.equals("media")) {
                              builder = new NotificationCompat.Builder(mContext, "media_channel");
                          } else if (channelId.equals("silent_ch")) {
                              builder = new NotificationCompat.Builder(mContext, "silent_channel");
                          } else if (channelId.equals("critical") || importance == 4) {
                              builder = new NotificationCompat.Builder(mContext, "high_importance");
                          } else if (channelId.equals("progress")) {
                              builder = new NotificationCompat.Builder(mContext, "progress_channel");
                          } else {
                              builder = new NotificationCompat.Builder(mContext, "default");
                          }

                          builder.setSmallIcon(mContext.getApplicationInfo().icon)
                                  .setContentTitle(title)
                                  .setContentText(message)
                                  .setColor(ContextCompat.getColor(mContext, R.color.colorPrimary))
                                  .setVisibility(NotificationCompat.VISIBILITY_PUBLIC)
                                  .setAutoCancel(true);

                          if (json.optBoolean("ongoing", false)) {
                              builder.setOngoing(true);
                          }

                          if (json.optBoolean("silent", false)) {
                              builder.setPriority(NotificationCompat.PRIORITY_MIN);
                          }

                          if (json.optString("type", "").equals("custom")) {
                              android.widget.RemoteViews remoteViews = new android.widget.RemoteViews(mContext.getPackageName(), R.layout.custom_notification);
                              remoteViews.setImageViewResource(R.id.custom_icon, mContext.getApplicationInfo().icon);
                              remoteViews.setTextViewText(R.id.custom_title, title);
                              remoteViews.setTextViewText(R.id.custom_text, message);
                              builder.setCustomContentView(remoteViews);
                          }

                          if (json.has("bigText")) {
                              builder.setStyle(new NotificationCompat.BigTextStyle().bigText(json.getString("bigText")));
                          }

                          if (json.has("bigPictureBase64")) {
                              byte[] decodedString = Base64.decode(json.getString("bigPictureBase64"), Base64.DEFAULT);
                              android.graphics.Bitmap bitmap = android.graphics.BitmapFactory.decodeByteArray(decodedString, 0, decodedString.length);
                              builder.setStyle(new NotificationCompat.BigPictureStyle().bigPicture(bitmap));
                          }

                          if (json.has("inboxLines")) {
                              JSONArray lines = json.getJSONArray("inboxLines");
                              NotificationCompat.InboxStyle inboxStyle = new NotificationCompat.InboxStyle();
                              for (int i = 0; i < lines.length(); i++) {
                                  inboxStyle.addLine(lines.getString(i));
                              }
                              builder.setStyle(inboxStyle);
                          }

                          if (json.has("progress") && json.has("maxProgress")) {
                              int progress = json.getInt("progress");
                              int max = json.getInt("maxProgress");
                              builder.setProgress(max, progress, json.optBoolean("indeterminate", false));
                          } else if (json.optBoolean("indeterminate", false)) {
                              builder.setProgress(0, 0, true);
                          }

                          if (json.has("actions")) {
                              JSONArray actions = json.getJSONArray("actions");
                              for (int i = 0; i < actions.length(); i++) {
                                  JSONObject act = actions.getJSONObject(i);
                                  String actTitle = act.optString("title", "Action");
                                  String actCode = act.optString("actionCode", "ACTION");

                                  Intent actionIntent = new Intent(mContext, MainActivity.class);
                                  actionIntent.putExtra("notification_action", actCode);
                                  actionIntent.setFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                                  android.app.PendingIntent pIntent = android.app.PendingIntent.getActivity(mContext, (int)System.currentTimeMillis() + i, actionIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);
                                  builder.addAction(android.R.drawable.ic_menu_send, actTitle, pIntent);
                              }
                          }

                          if (json.has("delayMs")) {
                              int delaySeconds = json.optInt("delayMs", 0) / 1000;
                              mContext.scheduleNotification(title, message, delaySeconds);
                              return;
                          }

                          if (json.has("badgeCount")) {
                              builder.setNumber(json.getInt("badgeCount"));
                          }

                          if (json.optBoolean("fullScreen", false)) {
                              Intent fullScreenIntent = new Intent(mContext, MainActivity.class);
                              android.app.PendingIntent pIntent = android.app.PendingIntent.getActivity(mContext, 0, fullScreenIntent, android.app.PendingIntent.FLAG_IMMUTABLE);
                              builder.setPriority(NotificationCompat.PRIORITY_MAX)
                                      .setCategory(NotificationCompat.CATEGORY_CALL)
                                      .setFullScreenIntent(pIntent, true);
                          }

                          NotificationManagerCompat manager = NotificationManagerCompat.from(mContext);
                          manager.notify(id, builder.build());

                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }

