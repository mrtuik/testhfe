name: Build APK with Capacitor

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}
      ADMOB_APP_ID: ${{ vars.ADMOB_APP_ID || 'ca-app-pub-3940256099942544~3347511713' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Licenses Auto-Accept)
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Initialize Android Web-View Wrapper Template
        run: |
          echo "Initializing lightweight Gradle project structure..."
          mkdir -p app/src/main/java/com/example/runner
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          
          echo "org.gradle.java.home=${JAVA_HOME}" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat << 'EOF' > settings.gradle
          rootProject.name = 'WebRunner'
          include ':app'
          EOF
          
          # Add Google Services Classpath for Firebase & Push Notifications
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Fetch Website Archive and Verify Assets
        run: |
          echo "Verifying local web workspace ZIP archive inside repository..."
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          
          mkdir -p raw_assets
          unzip -o "${ZIP_NAME}" -d raw_assets/
          
          if [ ! -f raw_assets/app_config.json ]; then
              echo "Creating missing app_config.json fallback parameters..."
              echo '{"appName":"'"$APP_NAME"'","packageName":"'"$PACKAGE_ID"'","versionName":"'"$VERSION_NAME"'","versionCode":'"$VERSION_CODE"'}' > raw_assets/app_config.json
          fi

      - name: Write Automated package.json (Safe ^6.0.0 Resolution)
        run: |
          # ^6.0.0 will dynamically fetch the highest 6.x.x version available without failing
          cat << 'EOF' > package.json
          {
            "name": "capacitor-app",
            "version": "1.0.0",
            "description": "Capacitor App built with HopFile Editor",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/android": "^6.0.0",
              "@capacitor/app": "^6.0.0",
              "@capacitor/app-launcher": "^6.0.0",
              "@capacitor/action-sheet": "^6.0.0",
              "@capacitor/browser": "^6.0.0",
              "@capacitor/camera": "^6.0.0",
              "@capacitor/clipboard": "^6.0.0",
              "@capacitor/device": "^6.0.0",
              "@capacitor/dialog": "^6.0.0",
              "@capacitor/filesystem": "^6.0.0",
              "@capacitor/geolocation": "^6.0.0",
              "@capacitor/haptics": "^6.0.0",
              "@capacitor/keyboard": "^6.0.0",
              "@capacitor/local-notifications": "^6.0.0",
              "@capacitor/motion": "^6.0.0",
              "@capacitor/network": "^6.0.0",
              "@capacitor/preferences": "^6.0.0",
              "@capacitor/push-notifications": "^6.0.0",
              "@capacitor/share": "^6.0.0",
              "@capacitor/splash-screen": "^6.0.0",
              "@capacitor/status-bar": "^6.0.0",
              "@capacitor/text-zoom": "^6.0.0",
              "@capacitor/toast": "^6.0.0",
              "@capacitor-community/admob": "^6.0.0",
              "@capacitor-community/apple-sign-in": "^6.0.0",
              "@capacitor-community/bluetooth-le": "^6.0.0",
              "@capacitor-community/camera-preview": "^6.0.0",
              "@capacitor-community/contacts": "^6.0.0",
              "@capacitor-community/keep-awake": "^5.0.0",
              "@capacitor-community/media": "^6.0.0",
              "@capacitor-community/sqlite": "^6.0.0",
              "@capacitor-community/text-to-speech": "^5.0.0",
              "@capacitor-community/speech-recognition": "^6.0.0",
              "@capacitor-community/background-geolocation": "^1.0.0",
              "@capawesome/capacitor-app-update": "^6.0.0",
              "@capawesome/capacitor-app-shortcuts": "^6.0.0",
              "@capawesome/capacitor-badge": "^6.0.0",
              "@capawesome/capacitor-file-picker": "^6.0.0",
              "@capawesome/capacitor-file-opener": "^6.0.0",
              "@capawesome/capacitor-mlkit-barcode-scanning": "^6.0.0",
              "@capawesome/capacitor-nfc": "^6.0.0",
              "@capawesome/capacitor-screen-orientation": "^6.0.0",
              "@capawesome-team/capacitor-android-foreground-service": "^6.0.0",
              "@capawesome/capacitor-firebase-authentication": "^6.0.0",
              "@capawesome/capacitor-firebase-messaging": "^6.0.0",
              "@capawesome/capacitor-firebase-firestore": "^6.0.0",
              "@capgo/capacitor-updater": "^6.0.0",
              "@capgo/native-audio": "^6.0.0",
              "@capgo/capacitor-native-biometric": "^6.0.0",
              "@capgo/inappreview": "^6.0.0",
              "@capgo/capacitor-social-login": "^6.0.0",
              "@capgo/capacitor-screen-recorder": "^6.0.0",
              "@capgo/background-task": "^6.0.0",
              "@transistorsoft/capacitor-background-fetch": "^6.0.0",
              "@transistorsoft/capacitor-background-geolocation": "^6.0.0",
              "capacitor-native-settings": "^6.0.0",
              "capacitor-video-player": "^6.0.0",
              "capacitor-music-controls-plugin": "^3.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF
          
          # Safe installation bypassing audit constraints
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Initialize Capacitor 6 Project Structure
        run: |
          APP_NAME_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').appName || '$APP_NAME')")
          PACKAGE_ID_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').packageName || '$PACKAGE_ID')")
          
          npx cap init "$APP_NAME_CONFIG" "$PACKAGE_ID_CONFIG" --web-dir=www
          mkdir -p www
          cp -r raw_assets/* www/
          npx cap add android

      - name: Decode google-services.json (FCM / Firebase)
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Clear Legacy Java Packages
        run: rm -rf android/app/src/main/java/*

      - name: Inject Custom Native Java Bridges & Resources
        run: |
          python3 -m pip install Pillow
          
          cat << 'EOF' > build_assets.py
          import json
          import os
          import shutil
          from PIL import Image

          config_path = "www/app_config.json"
          config = json.load(open(config_path)) if os.path.exists(config_path) else {}

          app_name = config.get("appName", os.environ.get("APP_NAME", "My App"))
          package_id = config.get("packageName", os.environ.get("PACKAGE_ID", "com.example.runner"))
          version_name = config.get("versionName", os.environ.get("VERSION_NAME", "1.0.0"))
          version_code = int(config.get("versionCode", os.environ.get("VERSION_CODE", "1")))
          theme_color = config.get("themeColor", "#4F46E5")
          splash_bg = config.get("splashBgColor", "#111827")
          screen_rot = config.get("screenRotation", "auto")
          admob_app_id = os.environ.get("ADMOB_APP_ID", "ca-app-pub-3940256099942544~3347511713")
          has_firebase = os.path.exists("android/app/google-services.json")

          camera_enabled = config.get("cameraEnabled", True)
          notifications_enabled = config.get("notificationsEnabled", True)
          microphone_enabled = config.get("microphoneEnabled", True)
          location_enabled = config.get("locationEnabled", False)
          biometric_enabled = config.get("biometricEnabled", True)
          storage_enabled = config.get("localStorageEnabled", True) or config.get("fileTransferEnabled", True)
          bg_audio_enabled = config.get("backgroundAudioEnabled", True)

          # Update root build.gradle for Firebase
          root_gradle = "android/build.gradle"
          if os.path.exists(root_gradle):
              txt = open(root_gradle).read()
              if has_firebase and "com.google.gms:google-services" not in txt:
                  txt = txt.replace(
                      "dependencies {",
                      "dependencies {\n        classpath 'com.google.gms:google-services:4.4.2'",
                      1,
                  )
                  open(root_gradle, "w").write(txt)

          # Gradle template using targetSdk 35
          gs_apply = "apply plugin: 'com.google.gms.google-services'" if has_firebase else ""
          app_build_gradle_template = f"""
          apply plugin: 'com.android.application'
          {gs_apply}
          
          android {{
              namespace '{package_id}'
              compileSdk 35
              defaultConfig {{
                  applicationId "{package_id}"
                  minSdk 24
                  targetSdk 35
                  versionCode {version_code}
                  versionName "{version_name}"
              }}
              compileOptions {{
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }}
              buildTypes {{
                  release {{
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }}
                  debug {{
                      minifyEnabled false
                  }}
              }}
          }}
          dependencies {{
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
              implementation 'androidx.webkit:webkit:1.11.0'
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'androidx.media:media:1.7.0'
              implementation 'androidx.biometric:biometric:1.1.0'
              implementation 'com.google.android.gms:play-services-ads:23.2.0'
          }}
          """
          open("android/app/build.gradle", "w").write(app_build_gradle_template.strip())

          # Generate system assets XML Configurations
          os.makedirs("android/app/src/main/res/values", exist_ok=True)
          colors_xml = f"""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">{theme_color}</color>
              <color name="colorPrimaryDark">{theme_color}</color>
              <color name="colorAccent">{theme_color}</color>
              <color name="splashBg">{splash_bg}</color>
          </resources>
          """
          with open("android/app/src/main/res/values/colors.xml", "w") as f:
              f.write(colors_xml.strip())
          
          styles_xml = """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>
          """
          with open("android/app/src/main/res/values/styles.xml", "w") as f:
              f.write(styles_xml.strip())

          strings_xml = f"""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">{app_name}</string>
              <string name="title_activity_main">{app_name}</string>
              <string name="package_name">{package_id}</string>
          </resources>"""
          with open("android/app/src/main/res/values/strings.xml", "w") as f:
              f.write(strings_xml.strip())

          # Setup Android Manifest
          perms = ['<uses-permission android:name="android.permission.INTERNET" />',
                   '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
                   '<uses-permission android:name="android.permission.WAKE_LOCK" />',
                   '<uses-permission android:name="com.google.android.gms.permission.AD_ID" />']
          if camera_enabled:        perms.append('<uses-permission android:name="android.permission.CAMERA" />')
          if microphone_enabled:    perms += ['<uses-permission android:name="android.permission.RECORD_AUDIO" />',
                                              '<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />']
          if notifications_enabled: perms += ['<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
                                              '<uses-permission android:name="android.permission.VIBRATE" />']
          if bg_audio_enabled:      perms += ['<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />',
                                              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />']
          if storage_enabled:       perms += ['<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />',
                                              '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />',
                                              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />',
                                              '<uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />',
                                              '<uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />']
          if location_enabled:      perms += ['<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
                                              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />']
          if biometric_enabled:     perms.append('<uses-permission android:name="android.permission.USE_BIOMETRIC" />')

          orientation = "portrait" if screen_rot == "portrait" else "landscape" if screen_rot == "landscape" else "unspecified"
          perms_xml = "\n    ".join(perms)
          
          bg_service = ''
          if bg_audio_enabled:
              bg_service = '''
              <service
                  android:name="com.capawesome.capacitorjs.plugins.foregroundservice.AndroidForegroundService"
                  android:foregroundServiceType="mediaPlayback"
                  android:exported="false" />'''

          manifest_template = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              {perms_xml}
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/AppTheme">
                  
                  <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="{admob_app_id}"/>
                  {bg_service}

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|layoutDirection|fontScale|screenLayout|density"
                      android:name="{package_id}.MainActivity"
                      android:label="@string/title_activity_main"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:screenOrientation="{orientation}"
                      android:theme="@style/AppTheme.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          """
          with open("android/app/src/main/AndroidManifest.xml", "w") as f:
              f.write(manifest_template.strip())

          # Build package structure and write main activity code
          package_path = package_id.replace(".", "/")
          java_dir = f"android/app/src/main/java/{package_path}"
          os.makedirs(java_dir, exist_ok=True)

          # Bridge Activity
          main_activity_java = f"""package {package_id};
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {{}}
          """
          with open(f"{java_dir}/MainActivity.java", "w") as f:
              f.write(main_activity_java)
              
          # Setup custom launcher icon using Pillow
          icon_src = "www/_app_icon.png"
          if os.path.exists(icon_src):
              sizes = { "mipmap-mdpi": 48, "mipmap-hdpi": 72, "mipmap-xhdpi": 96, "mipmap-xxhdpi": 144, "mipmap-xxxhdpi": 192 }
              try:
                  with Image.open(icon_src) as img:
                      for folder, size in sizes.items():
                          dest_dir = f"android/app/src/main/res/{folder}"
                          os.makedirs(dest_dir, exist_ok=True)
                          resized_img = img.resize((size, size), Image.Resampling.LANCZOS)
                          resized_img.save(f"{dest_dir}/ic_launcher.png")
              except Exception as e:
                  print(f"Error compiling custom launcher icon: {e}")
          EOF
          python3 build_assets.py

      - name: Sync Web Directory and Plugins to Android Template
        run: |
          echo "Running Capacitor Sync..."
          npx cap sync android

      - name: Run Debug APK Compilation Task
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Package Debug APK with Credits Document
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          cat << 'EOF' > android/app/build/outputs/apk/debug/credits.txt
          ==================================================
          HopFile Editor - Build Package
          ==================================================
          This package was generated dynamically by HopFile Editor Workspace.

          Credits:
          HopFile Editor is designed, developed, and maintained by tuik.
          All rights reserved.

          Thank you for choosing HopFile Editor as your Mobile IDE & Compiler!
          ==================================================
          EOF
          
          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk $APK_NAME
          zip -r $ZIP_NAME $APK_NAME credits.txt

      - name: Generate Dynamic Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          TAG="release-${CLEANED_NAME}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Artifact Target
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package build generated via HopFile Editor (Capacitor 6 Engine).
            - **Package ID:** `${{ env.PACKAGE_ID }}`
            - **Build ID:** `${{ github.run_number }}`
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload ZIP
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary build payload [skip ci]" || true
          git push origin main || git push origin master || true
