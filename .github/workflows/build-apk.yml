          if location_enabled:
              permission_manager_block += 'permissions.add(Manifest.permission.ACCESS_FINE_LOCATION);\n'
              permission_manager_block += 'permissions.add(Manifest.permission.ACCESS_COARSE_LOCATION);\n'

          permission_manager_block += """
          if (!permissions.isEmpty() && Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
              ArrayList<String> remaining = new ArrayList<>();
              for (String p : permissions) {
                  if (checkSelfPermission(p) != PackageManager.PERMISSION_GRANTED) {
                      remaining.add(p);
                  }
              }
              if (!remaining.isEmpty()) {
                  requestPermissions(remaining.toArray(new String[0]), 101);
              }
          }
          """
          
          main_activity = main_activity_java_template.replace("__PACKAGE_ID__", package_id)
          main_activity = main_activity.replace("__PHP_SUPPORT__", "true" if php_support else "false")
          main_activity = main_activity.replace("__PHP_PORT__", str(php_port))
          main_activity = main_activity.replace("__HOMEPAGE__", homepage)
          main_activity = main_activity.replace("__KEEP_SCREEN_ON__", "true" if keep_screen_on_enabled else "false")
          main_activity = main_activity.replace("__SECURE_WINDOW__", "true" if secure_window_enabled else "false")
          main_activity = main_activity.replace("__GEOLOCATION_ENABLED__", "true" if location_enabled else "false")
          main_activity = main_activity.replace("__EXTERNAL_BROWSER_ENABLED__", "true" if external_browser_enabled else "false")
          main_activity = main_activity.replace("__FILE_TRANSFER_ENABLED__", "true" if file_transfer_enabled else "false")
          main_activity = main_activity.replace("__CLIPBOARD_ENABLED__", "true" if clipboard_enabled else "false")
          main_activity = main_activity.replace("__DOUBLE_BACK_EXIT__", "true" if double_back_exit_enabled else "false")
          main_activity = main_activity.replace("__PERMISSION_MANAGER__", permission_manager_block)

          # Biometrics placeholder replacements configuration
          if biometric_enabled:
              biometric_imports = "import androidx.biometric.BiometricPrompt;\nimport androidx.biometric.BiometricManager;"
              biometric_logic = """
              BiometricManager biometricManager = BiometricManager.from(this);
              if (biometricManager.canAuthenticate(BiometricManager.Authenticators.BIOMETRIC_STRONG | BiometricManager.Authenticators.DEVICE_CREDENTIAL) == BiometricManager.BIOMETRIC_SUCCESS) {
                  java.util.concurrent.Executor executor = ContextCompat.getMainExecutor(this);
                  BiometricPrompt biometricPrompt = new BiometricPrompt(MainActivity.this, executor, new BiometricPrompt.AuthenticationCallback() {
                      @Override
                      public void onAuthenticationError(int errorCode, CharSequence errString) {
                          super.onAuthenticationError(errorCode, errString);
                          Toast.makeText(getApplicationContext(), "Authentication error: " + errString, Toast.LENGTH_SHORT).show();
                          finish();
                      }
                      @Override
                      public void onAuthenticationSucceeded(BiometricPrompt.AuthenticationResult result) {
                          super.onAuthenticationSucceeded(result);
                          Toast.makeText(getApplicationContext(), "Authentication succeeded!", Toast.LENGTH_SHORT).show();
                      }
                      @Override
                      public void onAuthenticationFailed() {
                          super.onAuthenticationFailed();
                          Toast.makeText(getApplicationContext(), "Authentication failed", Toast.LENGTH_SHORT).show();
                      }
                  });
                  BiometricPrompt.PromptInfo promptInfo = new BiometricPrompt.PromptInfo.Builder()
                          .setTitle("Biometric Login")
                          .setSubtitle("Log in using your credentials")
                          .setAllowedAuthenticators(BiometricManager.Authenticators.BIOMETRIC_STRONG | BiometricManager.Authenticators.DEVICE_CREDENTIAL)
                          .build();
                  biometricPrompt.authenticate(promptInfo);
              }
              """
              main_activity = main_activity.replace("__BIOMETRIC_IMPORTS__", biometric_imports)
              main_activity = main_activity.replace("__BIOMETRIC_INIT_LOGIC__", biometric_logic)
          else:
              main_activity = main_activity.replace("__BIOMETRIC_IMPORTS__", "")
              main_activity = main_activity.replace("__BIOMETRIC_INIT_LOGIC__", "")

          with open(f"{java_dir}/MainActivity.java", "w") as f:
              f.write(main_activity.strip())

          # Setup custom launcher icon using Pillow if assets available
          icon_src = "www/_app_icon.png"
          if os.path.exists(icon_src):
              sizes = {
                  "mipmap-mdpi": 48,
                  "mipmap-hdpi": 72,
                  "mipmap-xhdpi": 96,
                  "mipmap-xxhdpi": 144,
                  "mipmap-xxxhdpi": 192
              }
              try:
                  with Image.open(icon_src) as img:
                      for folder, size in sizes.items():
                          dest_dir = f"android/app/src/main/res/{folder}"
                          os.makedirs(dest_dir, exist_ok=True)
                          resized_img = img.resize((size, size), Image.Resampling.LANCZOS)
                          resized_img.save(f"{dest_dir}/ic_launcher.png")
              except Exception as e:
                  print(f"Error compiling custom launcher icon: {e}")
          EOF
          python3 build_assets.py

      - name: Sync Web Directory Changes to Android Template
        run: |
          echo "Running Capacitor Sync..."
          npx cap sync android

      - name: Generate Automated Release Keystore
        run: |
          echo "Generating automated release signing key..."
          keytool -genkey -v -keystore android/app/release.keystore -alias appalias -keyalg RSA -keysize 2048 -validity 10000 -storepass testpassword -keypass testpassword -dname "CN=HopFile, OU=Dev, O=HopFile, L=Dev, S=Dev, C=US"
          
          # Patch app/build.gradle to apply automatic signing [1]
          cat << 'EOF' >> android/app/build.gradle
          
          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword "testpassword"
                      keyAlias "appalias"
                      keyPassword "testpassword"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Run Release APK Compilation Task
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Package Signed APK with Credits Document [1]
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          # Inject clean credit properties into output directory [1]
          cat << 'EOF' > android/app/build/outputs/apk/release/credits.txt
          ==================================================
          HopFile Editor - Release Staging Package
          ==================================================
          This package was generated dynamically by HopFile Editor Workspace.

          Credits:
          HopFile Editor is designed, developed, and maintained by tuik.
          All rights reserved.

          Thank you for choosing HopFile Editor as your Mobile IDE & Compiler!
          ==================================================
          EOF
          
          cd android/app/build/outputs/apk/release/
          mv app-release.apk $APK_NAME
          zip -r $ZIP_NAME $APK_NAME credits.txt

      - name: Generate Dynamic Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          TAG="release-${CLEANED_NAME}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Artifact Target [1]
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package build generated via HopFile Editor (Capacitor 6 Engine Upgrade) [1].
            - **Package ID:** `${{ env.PACKAGE_ID }}`
            - **Build ID:** `${{ github.run_number }}`
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/release/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload ZIP [1]
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary build payload [skip ci]" || true
          git push origin main || git push origin master || true
