name: Build APK with Capacitor 6

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}
      ADMOB_APP_ID: ${{ vars.ADMOB_APP_ID || 'ca-app-pub-3940256099942544~3347511713' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Fetch Website Archive and Verify Assets
        run: |
          echo "Verifying local web workspace ZIP archive inside repository..."
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          
          mkdir -p raw_assets
          unzip -o "${ZIP_NAME}" -d raw_assets/
          
          if [ ! -f raw_assets/app_config.json ]; then
              echo '{"appName":"'"$APP_NAME"'","packageName":"'"$PACKAGE_ID"'","versionName":"'"$VERSION_NAME"'","versionCode":'"$VERSION_CODE"'}' > raw_assets/app_config.json
          fi

      - name: Write Automated package.json
        run: |
          cat << 'EOF' > package.json
          {
            "name": "capacitor-app",
            "version": "1.0.0",
            "description": "Capacitor App built with HopFile Editor",
            "dependencies": {
              "@capacitor/core": "^6.2.0",
              "@capacitor/android": "^6.2.0",
              "@capacitor/app": "^6.0.0",
              "@capacitor/app-launcher": "^6.0.0",
              "@capacitor/browser": "^6.0.0",
              "@capacitor/camera": "^6.0.0",
              "@capacitor/clipboard": "^6.0.0",
              "@capacitor/device": "^6.0.0",
              "@capacitor/dialog": "^6.0.0",
              "@capacitor/filesystem": "^6.0.0",
              "@capacitor/geolocation": "^6.0.0",
              "@capacitor/haptics": "^6.0.0",
              "@capacitor/keyboard": "^6.0.0",
              "@capacitor/local-notifications": "^6.0.0",
              "@capacitor/network": "^6.0.0",
              "@capacitor/preferences": "^6.0.0",
              "@capacitor/share": "^6.0.0",
              "@capacitor/splash-screen": "^6.0.0",
              "@capacitor/status-bar": "^6.0.0",
              "@capacitor/toast": "^6.0.0",
              "@capacitor-community/admob": "latest"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.2.0"
            }
          }
          EOF

      # ✅ GITHUB CLOUD VENDORING (CACHING) ADDED HERE
      - name: GitHub Cloud Vendoring (Cache node_modules)
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-capacitor-6-latest-v1

      # ✅ ONLY INSTALLS IF CACHE IS NOT FOUND
      - name: Install Dependencies (Offline Preferred)
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm install --prefer-offline --legacy-peer-deps --no-audit --no-fund

      - name: Initialize Capacitor 6 Project Structure
        run: |
          APP_NAME_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').appName || '$APP_NAME')")
          PACKAGE_ID_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').packageName || '$PACKAGE_ID')")
          
          npx cap init "$APP_NAME_CONFIG" "$PACKAGE_ID_CONFIG" --web-dir=www
          mkdir -p www
          cp -r raw_assets/* www/
          npx cap add android

      - name: Inject Custom Native Configs (SAFE PATCH METHOD)
        run: |
          python3 -m pip install Pillow
          
          cat << 'EOF' > patch_android.py
          import json, os, re
          from PIL import Image

          config_path = "www/app_config.json"
          config = json.load(open(config_path)) if os.path.exists(config_path) else {}

          version_name = config.get("versionName", os.environ.get("VERSION_NAME", "1.0.0"))
          version_code = int(config.get("versionCode", os.environ.get("VERSION_CODE", "1")))
          admob_app_id = config.get("admobAppId", os.environ.get("ADMOB_APP_ID", "ca-app-pub-3940256099942544~3347511713"))
          
          if not admob_app_id.strip():
              admob_app_id = "ca-app-pub-3940256099942544~3347511713"

          # 1. Patch App build.gradle (Keep Capacitor Plugins intact)
          gradle_path = "android/app/build.gradle"
          if os.path.exists(gradle_path):
              content = open(gradle_path).read()
              content = re.sub(r'versionCode\s+\d+', f'versionCode {version_code}', content)
              content = re.sub(r'versionName\s+"[^"]+"', f'versionName "{version_name}"', content)
              open(gradle_path, 'w').write(content)

          # 2. Patch AndroidManifest.xml (Add AdMob ID & Permissions securely)
          manifest_path = "android/app/src/main/AndroidManifest.xml"
          if os.path.exists(manifest_path):
              manifest = open(manifest_path).read()
              
              # AdMob Metadata injection
              admob_meta = f'<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="{admob_app_id}"/>'
              if "com.google.android.gms.ads.APPLICATION_ID" not in manifest:
                  manifest = manifest.replace("</application>", f"    {admob_meta}\n    </application>")
              
              # Common Permissions injection
              perms = [
                  '<uses-permission android:name="android.permission.INTERNET" />',
                  '<uses-permission android:name="android.permission.CAMERA" />',
                  '<uses-permission android:name="android.permission.RECORD_AUDIO" />',
                  '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />'
              ]
              for perm in perms:
                  if perm not in manifest:
                      manifest = manifest.replace("</manifest>", f"    {perm}\n</manifest>")
              
              open(manifest_path, 'w').write(manifest)

          # 3. Generate App Icons dynamically from Frontend Base64 Image
          icon_src = "www/_app_icon.png"
          if os.path.exists(icon_src):
              sizes = { "mipmap-mdpi": 48, "mipmap-hdpi": 72, "mipmap-xhdpi": 96, "mipmap-xxhdpi": 144, "mipmap-xxxhdpi": 192 }
              try:
                  with Image.open(icon_src) as img:
                      for folder, size in sizes.items():
                          dest_dir = f"android/app/src/main/res/{folder}"
                          os.makedirs(dest_dir, exist_ok=True)
                          resized_img = img.resize((size, size), Image.Resampling.LANCZOS)
                          resized_img.save(f"{dest_dir}/ic_launcher.png")
                          resized_img.save(f"{dest_dir}/ic_launcher_round.png")
                          resized_img.save(f"{dest_dir}/ic_launcher_foreground.png")
              except Exception as e:
                  print(f"Icon generation failed: {e}")
          EOF
          python3 patch_android.py

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Debug APK (Android)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Package APK with credits
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_OUT="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          cat << 'EOF' > android/app/build/outputs/apk/debug/credits.txt
          HopFile Editor - Capacitor 6 Build
          Generated automatically. All rights reserved.
          EOF
          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk "$APK_NAME"
          zip -r "$ZIP_OUT" "$APK_NAME" credits.txt

      - name: Generate Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          echo "TAG_NAME=release-${CLEANED_NAME}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package build generated via HopFile Editor (Capacitor 6 Engine).
            - **Package ID:** `${{ env.PACKAGE_ID }}`
            - **Build ID:** `${{ github.run_number }}`
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
