name: Build APK from Web Archive

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract User Web Payload
        run: |
          mkdir -p www
          unzip -o "${ZIP_NAME}" -d www/ || true
          if [ ! -f www/index.html ] && [ ! -f www/index.php ]; then
              SUBDIR=$(find www/ -name "index.html" -o -name "index.php" -print -quit | sed 's|/index.html||' | sed 's|/index.php||')
              if [ -n "$SUBDIR" ]; then
                  mv "$SUBDIR"/* www/
              fi
          fi

      - name: Initialize Capacitor 6 Project
        run: |
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 --legacy-peer-deps
          npx cap init "$APP_NAME" "$PACKAGE_ID" --web-dir www
          
          rm -f capacitor.config.ts capacitor.config.js
          
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "___PACKAGE_ID___",
            "appName": "___APP_NAME___",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "cleartext": true,
              "allowNavigation": ["*"]
            }
          }
          EOF
          sed -i "s/___PACKAGE_ID___/${PACKAGE_ID}/g" capacitor.config.json
          sed -i "s/___APP_NAME___/${APP_NAME}/g" capacitor.config.json
          
          npx cap add android

      - name: Generate App Icons
        run: |
          npm install -g @capacitor/assets@3 --legacy-peer-deps
          mkdir -p assets
          if [ -f "www/_app_icon.png" ]; then
            cp www/_app_icon.png assets/icon.png
          fi
          if [ -f "www/_splash_icon.png" ]; then
            cp www/_splash_icon.png assets/splash.png
          else
            cp assets/icon.png assets/splash.png || true
          fi
          if [ -f "assets/icon.png" ]; then
            npx capacitor-assets generate --android || true
          fi

      - name: Install Native Plugins
        run: |
          npm install @capacitor/splash-screen@6 @capacitor/app@6 @capacitor/haptics@6 @capacitor/keyboard@6 @capacitor/status-bar@6 --legacy-peer-deps
          npm install @capacitor-community/admob --legacy-peer-deps
          npx cap sync android

      - name: Upgrade Gradle Version (Fix ASM ClassReader Error)
        run: |
          cd android
          sed -i 's/gradle-8.2.1-all.zip/gradle-8.7-all.zip/g' gradle/wrapper/gradle-wrapper.properties

      - name: Configure Android Manifest & Permissions
        run: |
          node -e "
          const fs = require('fs');
          let config = {};
          try { config = JSON.parse(fs.readFileSync('www/app_config.json', 'utf8')); } catch(e) {}
          
          const admobId = config.admobAppId || 'ca-app-pub-3940256099942544~3347511713';
          const manifestPath = 'android/app/src/main/AndroidManifest.xml';
          
          if(fs.existsSync(manifestPath)) {
            let manifest = fs.readFileSync(manifestPath, 'utf8');
            const meta = \`<meta-data android:name=\\\"com.google.android.gms.ads.APPLICATION_ID\\\" android:value=\\\"\${admobId}\\\"/>\`;
            if(!manifest.includes('com.google.android.gms.ads.APPLICATION_ID')) {
              manifest = manifest.replace('</application>', \`    \${meta}\\n    </application>\`);
            }
            
            const perms = [
              '<uses-permission android:name=\"android.permission.INTERNET\" />',
              '<uses-permission android:name=\"android.permission.WAKE_LOCK\" />',
              '<uses-permission android:name=\"android.permission.RECORD_AUDIO\" />',
              '<uses-permission android:name=\"android.permission.MODIFY_AUDIO_SETTINGS\" />',
              '<uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\" />'
            ];
            
            perms.forEach(p => {
              if(!manifest.includes(p)) {
                manifest = manifest.replace('</manifest>', \`    \${p}\\n</manifest>\`);
              }
            });
            
            fs.writeFileSync(manifestPath, manifest);
          }
          "

      - name: Fetch PHP 8.4 Binary
        run: |
          wget -q https://github.com/pmmp/PHP-Binaries/releases/download/pm5-php-8.4-latest/PHP-8.4-Android-arm64-PM5.tar.gz -O php.tar.gz || true
          if [ -s php.tar.gz ] && tar -tzf php.tar.gz >/dev/null 2>&1; then
              tar -xzf php.tar.gz
              mkdir -p android/app/src/main/jniLibs/arm64-v8a
              PHP_BIN_PATH=$(find . -name "php" -type f -print -quit)
              if [ -n "$PHP_BIN_PATH" ]; then
                  cp "$PHP_BIN_PATH" android/app/src/main/jniLibs/arm64-v8a/libphp.so
              fi
          fi

      - name: Modify MainActivity for PHP Server
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          function findMainActivity(dir) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const fullPath = path.join(dir, file);
              if (fs.statSync(fullPath).isDirectory()) {
                const result = findMainActivity(fullPath);
                if (result) return result;
              } else if (file === 'MainActivity.java') {
                return fullPath;
              }
            }
            return null;
          }
          
          const mainActivityPath = findMainActivity('android/app/src/main/java');
          
          if(mainActivityPath && fs.existsSync(mainActivityPath)) {
            let code = fs.readFileSync(mainActivityPath, 'utf8');
            
            if(!code.includes('android.os.Bundle')) {
              code = code.replace('import com.getcapacitor.BridgeActivity;', 'import com.getcapacitor.BridgeActivity;\\nimport android.os.Bundle;\\nimport java.io.File;');
            }
            
            const method = \`
            @Override
            public void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                new Thread(() -> {
                    try {
                        String nativeDir = getApplicationInfo().nativeLibraryDir;
                        String phpBinary = nativeDir + \\\"/libphp.so\\\";
                        String docRoot = getApplicationContext().getFilesDir().getAbsolutePath() + \\\"/public\\\";
                        File binaryFile = new File(phpBinary);
                        if (binaryFile.exists()) binaryFile.setExecutable(true, false);
                        ProcessBuilder pb = new ProcessBuilder(phpBinary, \\\"-S\\\", \\\"127.0.0.1:8080\\\", \\\"-t\\\", docRoot);
                        pb.redirectErrorStream(true);
                        pb.start();
                    } catch (Exception e) { e.printStackTrace(); }
                }).start();
            }\`;
            
            if(!code.includes('onCreate(Bundle')) {
              code = code.replace('public class MainActivity extends BridgeActivity {', 'public class MainActivity extends BridgeActivity {\\n' + method);
              fs.writeFileSync(mainActivityPath, code);
            }
          }
          "

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Package APK into ZIP
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk $APK_NAME
          zip -r ../../../../../$ZIP_NAME $APK_NAME

      - name: Generate Unique Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          echo "TAG_NAME=release-${CLEANED_NAME}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: "Automated Capacitor Native Build for **${{ env.APP_NAME }}**"
          files: |
            android/app/build/outputs/apk/debug/*.apk
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload zip from git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary payload [skip ci]" || true
          git push origin main || git push origin master || true
