name: Build APK from Web Archive

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Licenses Auto-Accept)
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and Extract Web Assets
        run: |
          echo "Verifying local web workspace ZIP archive inside repository..."
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          
          echo "Extracting workspace targets deep into assets folder..."
          mkdir -p www
          unzip -o "${ZIP_NAME}" -d www/
          
          if [ ! -f www/index.html ]; then
              echo "index.html not found in assets root. Checking subdirectories..."
              SUBDIR=$(find www/ -name "index.html" -print -quit | sed 's|/index.html||')
              if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "www" ]; then
                  echo "Found index.html in directory: $SUBDIR. Flattening contents..."
                  mv "$SUBDIR"/* www/
              else
                  echo "WARNING: index.html not found in package payload!"
              fi
          fi

      - name: Setup Capacitor Project Automatically
        run: |
          echo "Creating automated dynamic Node configuration package.json..."
          cat << 'EOF' > package.json
          {
            "name": "hopfile-compiled-app",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/android": "^6.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF
          
          echo "Installing Capacitor core frameworks..."
          npm install
          
          echo "Creating capacitor.config.json directly to bypass interactive prompts..."
          cat << EOF > capacitor.config.json
          {
            "appId": "${PACKAGE_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF
          
          echo "Injecting Android platform wrappers..."
          npx cap add android

      - name: Process Custom Assets & Apply Configs
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pil
          
          cat << 'EOF' > configure_capacitor.py
          import json
          import os
          import urllib.request
          from PIL import Image

          config_path = "www/app_config.json"
          config = {}
          if os.path.exists(config_path):
              with open(config_path, "r") as f:
                  config = json.load(f)

          # Extract configurations with fallbacks
          app_name = config.get("appName", os.environ.get("APP_NAME", "My App"))
          package_id = config.get("packageName", os.environ.get("PACKAGE_ID", "com.example.runner"))
          version_name = config.get("versionName", os.environ.get("VERSION_NAME", "1.0.0"))
          version_code = int(config.get("versionCode", os.environ.get("VERSION_CODE", "1")))
          theme_color = config.get("themeColor", "#4F46E5")

          # 1. Automatically scale and inject Launcher App Icon if custom logo is found
          icon_src = "www/_app_icon.png"
          if os.path.exists(icon_src):
              print("Custom launcher icon found! Resizing into mipmaps...")
              sizes = {
                  "mipmap-mdpi": 48,
                  "mipmap-hdpi": 72,
                  "mipmap-xhdpi": 96,
                  "mipmap-xxhdpi": 144,
                  "mipmap-xxxhdpi": 192
              }
              try:
                  with Image.open(icon_src) as img:
                      for folder, size in sizes.items():
                          dest_dir = f"android/app/src/main/res/{folder}"
                          os.makedirs(dest_dir, exist_ok=True)
                          resized_img = img.resize((size, size), Image.Resampling.LANCZOS)
                          resized_img.save(f"{dest_dir}/ic_launcher.png")
                          resized_img.save(f"{dest_dir}/ic_launcher_round.png")
              except Exception as e:
                  print(f"Error compiling launcher icon structures: {e}")

          # 2. Automatically apply colors to native resource XML
          colors_xml_path = "android/app/src/main/res/values/colors.xml"
          if os.path.exists(colors_xml_path):
              with open(colors_xml_path, "r") as f:
                  colors_content = f.read()
              # Append or modify theme colors
              if "colorPrimary" in colors_content:
                  colors_content = colors_content.replace("#4F46E5", theme_color)
              with open(colors_xml_path, "w") as f:
                  f.write(colors_content)
          EOF
          python3 configure_capacitor.py

      - name: Sync Web Code into Capacitor Android
        run: |
          npx cap sync android

      - name: Compile Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug

      - name: Map Output Structure to Legacy Paths
        run: |
          echo "Copying the compiled APK to the legacy path structure so HopFile frontend can retrieve it..."
          mkdir -p app/build/outputs/apk/debug/
          cp android/app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/app-debug.apk

      - name: Package APK into ZIP and Rename
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          # Create custom credits.txt file
          cat << 'EOF' > app/build/outputs/apk/debug/credits.txt
          ==================================================
          HopFile Editor - Release Staging Package
          ==================================================
          This package was generated dynamically by HopFile Editor Workspace.

          Credits:
          HopFile Editor is designed, developed, and maintained by tuik.
          All rights reserved.

          Thank you for choosing HopFile Editor as your Mobile IDE & Compiler!
          ==================================================
          EOF
          
          cd app/build/outputs/apk/debug/
          mv app-debug.apk $APK_NAME
          zip -r $ZIP_NAME $APK_NAME credits.txt

      - name: Generate Unique Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          TAG="release-${CLEANED_NAME}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package build for **${{ env.APP_NAME }}**
            - **Package ID:** `${{ env.PACKAGE_ID }}`
            - **Build ID:** `${{ github.run_number }}`
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload zip from git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary build payload [skip ci]" || true
          git push origin main || git push origin master || true
