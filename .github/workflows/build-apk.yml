              public void triggerWebAction(final String action) {
                  runOnUiThread(new Runnable() {
                      @Override
                      public void run() {
                          if (mWebView != null) {
                              if ("PREV".equals(action)) {
                                  mWebView.loadUrl("javascript:(function(){ if(window.onNotificationAction){ window.onNotificationAction('PREV_ACTION'); return; } var currentNameEl = document.getElementById('playerTrackName'); if(!currentNameEl) return; var currentName = currentNameEl.textContent; var items = document.querySelectorAll('.track-item'); if(items.length <= 1) return; var currentIndex = -1; for(var i=0; i<items.length; i++){ var nameEl = items[i].querySelector('.track-name'); if(nameEl && nameEl.textContent === currentName){ currentIndex = i; break; } } if(currentIndex !== -1){ var targetIndex = (currentIndex - 1 + items.length) % items.length; var playBtn = items[targetIndex].querySelector('.action-btn[onclick^=\"playTrack\"]'); if(playBtn) playBtn.click(); } })()");
                              } else if ("PLAY_PAUSE".equals(action) || "TOGGLE_PLAY_ACTION".equals(action)) {
                                  mWebView.loadUrl("javascript:var btn = document.getElementById('playerPlayPauseBtn'); if(btn) btn.click();");
                              } else if ("NEXT".equals(action)) {
                                  mWebView.loadUrl("javascript:(function(){ if(window.onNotificationAction){ window.onNotificationAction('NEXT_ACTION'); return; } var currentNameEl = document.getElementById('playerTrackName'); if(!currentNameEl) return; var currentName = currentNameEl.textContent; var items = document.querySelectorAll('.track-item'); if(items.length <= 1) return; var currentIndex = -1; for(var i=0; i<items.length; i++){ var nameEl = items[i].querySelector('.track-name'); if(nameEl && nameEl.textContent === currentName){ currentIndex = i; break; } } if(currentIndex !== -1){ var targetIndex = (currentIndex + 1) % items.length; var playBtn = items[targetIndex].querySelector('.action-btn[onclick^=\"playTrack\"]'); if(playBtn) playBtn.click(); } })()");
                              } else if ("STOP".equals(action) || "STOP_ACTION".equals(action)) {
                                  mWebView.loadUrl("javascript:var btn = document.getElementById('playerStopBtn'); if(btn) btn.click();");
                              } else if ("REWIND".equals(action)) {
                                  mWebView.loadUrl("javascript:(function(){ var audio = window.currentAudio || (typeof currentAudio !== 'undefined' ? currentAudio : null); if(audio) audio.currentTime = Math.max(0, audio.currentTime - 10); })()");
                              } else if ("FAST_FORWARD".equals(action)) {
                                  mWebView.loadUrl("javascript:(function(){ var audio = window.currentAudio || (typeof currentAudio !== 'undefined' ? currentAudio : null); if(audio) audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); })()");
                              }
                          }
                      }
                  });
              }

