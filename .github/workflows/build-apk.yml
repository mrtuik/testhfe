              private void copyAssetFolder(String srcFolder, String destPath) {
                  try {
                      String[] files = getAssets().list(srcFolder);
                      if (files == null) return;
                      java.io.File destDir = new java.io.File(destPath);
                      if (!destDir.exists()) destDir.mkdirs();
                      for (String file : files) {
                          String srcFile = srcFolder.isEmpty() ? file : srcFolder + "/" + file;
                          String destFile = destPath + "/" + file;
                          String[] subFiles = getAssets().list(srcFile);
                          if (subFiles != null && subFiles.length > 0) {
                              copyAssetFolder(srcFile, destFile);
                          } else {
                              copyAsset(srcFile, destFile);
                          }
                      }
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              private void copyAsset(String srcFile, String destFile) {
                  try (java.io.InputStream in = getAssets().open(srcFile);
                       java.io.OutputStream out = new java.io.FileOutputStream(destFile)) {
                      byte[] buffer = new byte[8192];
                      int read;
                      while ((read = in.read(buffer)) != -1) {
                          out.write(buffer, 0, read);
                      }
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              private void startPhpServer(final int port) {
                  new Thread(new Runnable() {
                      @Override
                      public void run() {
                          try {
                              String nativeDir = getApplicationInfo().nativeLibraryDir;
                              String phpBinary = nativeDir + "/libphp.so";
                              String docRoot = getFilesDir().getAbsolutePath() + "/www";

                              java.io.File binaryFile = new java.io.File(phpBinary);
                              if (binaryFile.exists()) {
                                  binaryFile.setExecutable(true, false);
                              }

                              java.lang.ProcessBuilder pb = new java.lang.ProcessBuilder(
                                  phpBinary,
                                  "-S", "127.0.0.1:" + port,
                                  "-t", docRoot
                              );
                              pb.directory(new java.io.File(docRoot));
                              pb.redirectErrorStream(true);
                              phpProcess = pb.start();

                              java.io.InputStream is = phpProcess.getInputStream();
                              java.io.BufferedReader reader = new java.io.BufferedReader(new java.io.InputStreamReader(is));
                              String line;
                              while ((line = reader.readLine()) != null) {
                                  android.util.Log.d("PHPServer", line);
                              }
                          } catch (Exception e) {
                              e.printStackTrace();
                          }
                      }
                  }).start();
              }

              @Override
              protected void onDestroy() {
                  if (sInstance == this) {
                      sInstance = null;
                  }
                  mPollHandler.removeCallbacks(mPollRunnable);
                  if (phpProcess != null) {
                      phpProcess.destroy();
                  }
                  if (mTTS != null) {
                      mTTS.stop();
                      mTTS.shutdown();
                  }
                  super.onDestroy();
              }

