name: Build APK from Web Archive

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App display name'
        required: false
        default: 'My App'
      packageId:
        description: 'Package ID (e.g. com.example.myapp)'
        required: false
        default: 'com.example.myapp'
      versionName:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'
      versionCode:
        description: 'Version code (integer)'
        required: false
        default: '1'
      zipName:
        description: 'Name of the uploaded zip file in repo root (e.g. payload.zip)'
        required: false
        default: 'payload.zip'
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      APP_NAME:     ${{ github.event.client_payload.appName     || github.event.inputs.appName     || 'My App' }}
      RAW_PKG_ID:   ${{ github.event.client_payload.packageId   || github.event.inputs.packageId   || 'com.example.myapp' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || github.event.inputs.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || github.event.inputs.versionCode || '1' }}
      ZIP_NAME:     ${{ github.event.client_payload.zipName     || github.event.inputs.zipName     || 'payload.zip' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanitize PACKAGE_ID (Java-safe)
        run: |
          set -e
          RAW="${RAW_PKG_ID}"
          # lowercase, replace invalid chars with dots, collapse, trim
          CLEAN=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9.]+/./g; s/\.+/./g; s/^\.+|\.+$//g')
          # ensure at least 2 segments
          if ! echo "$CLEAN" | grep -q '\.'; then
            CLEAN="com.example.${CLEAN:-myapp}"
          fi
          # ensure no segment starts with a digit
          CLEAN=$(echo "$CLEAN" | awk -F. '{for(i=1;i<=NF;i++){if($i ~ /^[0-9]/) $i="a"$i;} OFS="."; print}')
          echo "PACKAGE_ID=$CLEAN" >> "$GITHUB_ENV"
          echo "Using PACKAGE_ID=$CLEAN"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify payload zip exists
        run: |
          if [ ! -f "${ZIP_NAME}" ]; then
            echo "::error::Zip '${ZIP_NAME}' not found in repo root."
            ls -la
            exit 1
          fi

      - name: Extract web payload into www/
        run: |
          set -e
          rm -rf www extracted
          mkdir -p extracted www
          unzip -q "${ZIP_NAME}" -d extracted

          # Find directory containing index.html (or index.htm)
          INDEX_PATH=$(find extracted -type f \( -iname "index.html" -o -iname "index.htm" \) | head -n 1 || true)
          if [ -z "$INDEX_PATH" ]; then
            echo "::error::No index.html found inside ${ZIP_NAME}"
            find extracted -maxdepth 3
            exit 1
          fi
          SRC_DIR=$(dirname "$INDEX_PATH")
          echo "Web root detected: $SRC_DIR"
          cp -R "$SRC_DIR"/. www/
          echo "www/ contents:"
          ls -la www | head -n 50

      - name: Initialize Node project & install Capacitor
        run: |
          set -e
          # fresh package.json so we don't conflict with anything in repo
          rm -f package.json package-lock.json
          npm init -y >/dev/null
          npm install --save \
            @capacitor/core@^6 \
            @capacitor/android@^6
          npm install --save-dev @capacitor/cli@^6

      - name: Write capacitor.config.json
        run: |
          cat > capacitor.config.json <<EOF
          {
            "appId": "${PACKAGE_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "allowNavigation": ["*"]
            }
          }
          EOF
          cat capacitor.config.json

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch Android version & Gradle memory
        run: |
          set -e
          BUILD_GRADLE=android/app/build.gradle
          sed -i -E "s/versionCode [0-9]+/versionCode ${VERSION_CODE}/" "$BUILD_GRADLE"
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"${VERSION_NAME}\"/" "$BUILD_GRADLE"

          GP=android/gradle.properties
          touch "$GP"
          # remove any existing jvmargs line then append a generous one
          sed -i '/^org.gradle.jvmargs=/d' "$GP"
          echo 'org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8' >> "$GP"
          echo 'org.gradle.daemon=false' >> "$GP"
          echo 'org.gradle.parallel=true' >> "$GP"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk -type f -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced"
            exit 1
          fi
          echo "Built: $APK"
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14
