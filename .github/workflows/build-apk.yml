name: Build APK with Capacitor 6

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}
      ADMOB_APP_ID: ${{ vars.ADMOB_APP_ID || 'ca-app-pub-3940256099942544~3347511713' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Strictly required for Capacitor 6)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2.1'

      - name: Fetch Website Archive and Verify Assets
        run: |
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          mkdir -p raw_assets
          unzip -o "${ZIP_NAME}" -d raw_assets/
          if [ ! -f raw_assets/app_config.json ]; then
              echo '{"appName":"'"$APP_NAME"'","packageName":"'"$PACKAGE_ID"'","versionName":"'"$VERSION_NAME"'","versionCode":'"$VERSION_CODE"'}' > raw_assets/app_config.json
          fi

      - name: Write Automated package.json (Strict Capacitor 6 Versions)
        run: |
          # FIXED: Strictly using ^6.0.0 to prevent Capacitor 7 / Java 21 conflicts
          cat << 'EOF' > package.json
          {
            "name": "capacitor-app",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/android": "^6.0.0",
              "@capacitor/app": "^6.0.0",
              "@capacitor/browser": "^6.0.0",
              "@capacitor/camera": "^6.0.0",
              "@capacitor/clipboard": "^6.0.0",
              "@capacitor/device": "^6.0.0",
              "@capacitor/dialog": "^6.0.0",
              "@capacitor/filesystem": "^6.0.0",
              "@capacitor/geolocation": "^6.0.0",
              "@capacitor/haptics": "^6.0.0",
              "@capacitor/keyboard": "^6.0.0",
              "@capacitor/local-notifications": "^6.0.0",
              "@capacitor/motion": "^6.0.0",
              "@capacitor/network": "^6.0.0",
              "@capacitor/preferences": "^6.0.0",
              "@capacitor/push-notifications": "^6.0.0",
              "@capacitor/share": "^6.0.0",
              "@capacitor/splash-screen": "^6.0.0",
              "@capacitor/status-bar": "^6.0.0",
              "@capacitor/text-zoom": "^6.0.0",
              "@capacitor/toast": "^6.0.0",
              "@capacitor-community/admob": "^6.0.0",
              "@capacitor-community/text-to-speech": "^5.0.0",
              "@capawesome-team/capacitor-file-opener": "^6.0.0",
              "@capawesome/capacitor-file-picker": "^6.0.0",
              "@capawesome/capacitor-screen-orientation": "^6.0.0",
              "@capawesome-team/capacitor-android-foreground-service": "^6.0.0",
              "@capgo/capacitor-native-audio": "^6.0.0",
              "@capgo/capacitor-background-task": "^6.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF
          
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Initialize Capacitor 6 Project Structure
        run: |
          APP_NAME_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').appName || '$APP_NAME')")
          PACKAGE_ID_CONFIG=$(node -e "console.log(require('./raw_assets/app_config.json').packageName || '$PACKAGE_ID')")
          
          npx cap init "$APP_NAME_CONFIG" "$PACKAGE_ID_CONFIG" --web-dir=www
          mkdir -p www
          cp -r raw_assets/* www/
          npx cap add android

      - name: Decode google-services.json
        run: |
          cat << 'EOF' > android/app/google-services.json
          {
            "project_info": { "project_number": "123456789012", "project_id": "hopfile-project" },
            "client": [{
              "client_info": { "mobilesdk_app_id": "1:123456789012:android:1234567890abcdef", "android_client_info": { "package_name": "com.example.runner" } },
              "api_key": [{ "current_key": "dummy_api_key_for_compilation" }]
            }]
          }
          EOF

      - name: Clear Legacy Java Packages
        run: rm -rf android/app/src/main/java/*

      - name: Inject Custom Native Configs
        run: |
          python3 -m pip install Pillow
          
          cat << 'EOF' > build_assets.py
          import json, os
          from PIL import Image

          config_path = "www/app_config.json"
          config = json.load(open(config_path)) if os.path.exists(config_path) else {}

          app_name = config.get("appName", os.environ.get("APP_NAME", "My App"))
          package_id = config.get("packageName", os.environ.get("PACKAGE_ID", "com.example.runner"))
          version_name = config.get("versionName", os.environ.get("VERSION_NAME", "1.0.0"))
          version_code = int(config.get("versionCode", os.environ.get("VERSION_CODE", "1")))
          theme_color = config.get("themeColor", "#4F46E5")
          splash_bg = config.get("splashBgColor", "#111827")
          screen_rot = config.get("screenRotation", "auto")
          admob_app_id = os.environ.get("ADMOB_APP_ID", "ca-app-pub-3940256099942544~3347511713")

          # Update the dummy google-services.json with correct package_id
          gs_path = "android/app/google-services.json"
          if os.path.exists(gs_path):
              gs_data = json.load(open(gs_path))
              gs_data["client"][0]["client_info"]["android_client_info"]["package_name"] = package_id
              open(gs_path, "w").write(json.dumps(gs_data))

          root_gradle = "android/build.gradle"
          if os.path.exists(root_gradle):
              txt = open(root_gradle).read()
              if "com.google.gms:google-services" not in txt:
                  txt = txt.replace("dependencies {", "dependencies {\n        classpath 'com.google.gms:google-services:4.4.2'", 1)
                  open(root_gradle, "w").write(txt)

          # Gradle template pinned to SDK 34 and Java 17
          app_build_gradle_template = f"""
          apply plugin: 'com.android.application'
          apply plugin: 'com.google.gms.google-services'
          
          android {{
              namespace '{package_id}'
              compileSdk 34
              defaultConfig {{
                  applicationId "{package_id}"
                  minSdk 24
                  targetSdk 34
                  versionCode {version_code}
                  versionName "{version_name}"
              }}
              compileOptions {{
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }}
              buildTypes {{
                  release {{ minifyEnabled false }}
                  debug {{ minifyEnabled false }}
              }}
          }}
          dependencies {{
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
              implementation 'androidx.webkit:webkit:1.11.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.gms:play-services-ads:23.0.0'
          }}
          """
          open("android/app/build.gradle", "w").write(app_build_gradle_template.strip())

          # Generate system assets XML Configurations
          os.makedirs("android/app/src/main/res/values", exist_ok=True)
          with open("android/app/src/main/res/values/colors.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?>\n<resources>\n<color name="colorPrimary">{theme_color}</color>\n<color name="colorPrimaryDark">{theme_color}</color>\n<color name="colorAccent">{theme_color}</color>\n<color name="splashBg">{splash_bg}</color>\n</resources>')
          
          with open("android/app/src/main/res/values/strings.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?>\n<resources>\n<string name="app_name">{app_name}</string>\n<string name="title_activity_main">{app_name}</string>\n<string name="package_name">{package_id}</string>\n</resources>')

          with open("android/app/src/main/res/values/styles.xml", "w") as f:
              f.write("""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>""")

          # Setup Android Manifest Injections
          perms = ['<uses-permission android:name="android.permission.INTERNET" />',
                   '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
                   '<uses-permission android:name="android.permission.CAMERA" />',
                   '<uses-permission android:name="android.permission.RECORD_AUDIO" />',
                   '<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />',
                   '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
                   '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />',
                   '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />',
                   '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />',
                   '<uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />',
                   '<uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />',
                   '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
                   '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
                   '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />',
                   '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />',
                   '<uses-permission android:name="android.permission.WAKE_LOCK" />',
                   '<uses-permission android:name="com.google.android.gms.permission.AD_ID" />']
          
          orientation = "portrait" if screen_rot == "portrait" else "landscape" if screen_rot == "landscape" else "unspecified"
          perms_xml = "\n    ".join(perms)
          
          bg_service = '''<service android:name="dev.robingenz.capacitorjs.plugins.foregroundservice.ForegroundService" android:exported="false" android:foregroundServiceType="mediaPlayback|dataSync" />'''

          manifest_template = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              {perms_xml}
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/AppTheme">
                  
                  <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="{admob_app_id}"/>
                  {bg_service}

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|layoutDirection|fontScale|screenLayout|density"
                      android:name="{package_id}.MainActivity"
                      android:label="@string/title_activity_main"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:screenOrientation="{orientation}"
                      android:theme="@style/AppTheme.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          """
          open("android/app/src/main/AndroidManifest.xml", "w").write(manifest_template)

          # Bridge Activity
          pkg_path = package_id.replace(".", "/")
          java_dir = f"android/app/src/main/java/{pkg_path}"
          os.makedirs(java_dir, exist_ok=True)
          open(f"{java_dir}/MainActivity.java", "w").write(f"package {package_id};\nimport com.getcapacitor.BridgeActivity;\npublic class MainActivity extends BridgeActivity {{}}\n")
          
          # Setup custom launcher icon using Pillow
          icon_src = "www/_app_icon.png"
          if os.path.exists(icon_src):
              sizes = { "mipmap-mdpi": 48, "mipmap-hdpi": 72, "mipmap-xhdpi": 96, "mipmap-xxhdpi": 144, "mipmap-xxxhdpi": 192 }
              try:
                  with Image.open(icon_src) as img:
                      for folder, size in sizes.items():
                          dest_dir = f"android/app/src/main/res/{folder}"
                          os.makedirs(dest_dir, exist_ok=True)
                          img.resize((size, size), Image.Resampling.LANCZOS).save(f"{dest_dir}/ic_launcher.png")
              except Exception as e:
                  print(f"Icon generation failed: {e}")
          EOF
          python3 build_assets.py

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Package APK with credits
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_OUT="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          cat << 'EOF' > android/app/build/outputs/apk/debug/credits.txt
          HopFile Editor - Capacitor 6 Build
          Generated automatically. All rights reserved.
          EOF
          cd android/app/build/outputs/apk/debug/
          mv app-debug.apk "$APK_NAME"
          zip -r "$ZIP_OUT" "$APK_NAME" credits.txt

      - name: Generate Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          echo "TAG_NAME=release-${CLEANED_NAME}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package build generated via HopFile Editor (Capacitor 6 Engine).
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
