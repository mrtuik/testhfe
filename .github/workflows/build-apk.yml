              public static class NotificationReceiver extends android.content.BroadcastReceiver {
                  @Override
                  public void onReceive(android.content.Context context, Intent intent) {
                      String title = intent.getStringExtra("title");
                      String message = intent.getStringExtra("message");
                      if (title == null) title = "Scheduled Reminder";
                      if (message == null) message = "Time to check your app!";

                      NotificationManager manager = (NotificationManager) context.getSystemService(android.content.Context.NOTIFICATION_SERVICE);
                      if (manager == null) return;

                      NotificationCompat.Builder builder;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          builder = new NotificationCompat.Builder(context, "default");
                      } else {
                          builder = new NotificationCompat.Builder(context);
                      }

                      Intent appIntent = new Intent(context, MainActivity.class);
                      appIntent.setFlags(Intent.FLAG_ACTIVITY_CLEAR_TOP | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                      android.app.PendingIntent pIntent = android.app.PendingIntent.getActivity(context, (int)System.currentTimeMillis(), appIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                      builder.setSmallIcon(context.getApplicationInfo().icon)
                              .setContentTitle(title)
                              .setContentText(message)
                              .setColor(ContextCompat.getColor(context, R.color.colorPrimary))
                              .setVisibility(NotificationCompat.VISIBILITY_PUBLIC)
                              .setAutoCancel(true)
                              .setContentIntent(pIntent);

                      manager.notify((int) System.currentTimeMillis(), builder.build());
                  }
              }

              public static class ForegroundService extends android.app.Service {
                  private android.support.v4.media.session.MediaSessionCompat mMediaSession;

                  @Override
                  public void onCreate() {
                      super.onCreate();
                      mMediaSession = new android.support.v4.media.session.MediaSessionCompat(this, "MediaPlayback");
                      mMediaSession.setActive(true);
                  }

                  @Override
                  public int onStartCommand(Intent intent, int flags, int startId) {
                      if (intent == null) return START_NOT_STICKY;
                      
                      String action = intent.getAction();
                      String taskType = intent.getStringExtra("task_type");
                      if (taskType == null) taskType = "media";

                      if (action != null) {
                          if ("ACTION_PREV".equals(action)) {
                              if (MainActivity.sInstance != null) {
                                  MainActivity.sInstance.triggerWebAction("PREV");
                              }
                              return START_STICKY;
                          } else if ("ACTION_TOGGLE_PLAY".equals(action)) {
                              if (MainActivity.sInstance != null) {
                                  MainActivity.sInstance.triggerWebAction("PLAY_PAUSE");
                              }
                              return START_STICKY;
                          } else if ("ACTION_NEXT".equals(action)) {
                              if (MainActivity.sInstance != null) {
                                  MainActivity.sInstance.triggerWebAction("NEXT");
                              }
                              return START_STICKY;
                          } else if ("ACTION_REWIND".equals(action)) {
                              if (MainActivity.sInstance != null) {
                                  MainActivity.sInstance.triggerWebAction("REWIND");
                              }
                              return START_STICKY;
                          } else if ("ACTION_FAST_FORWARD".equals(action)) {
                              if (MainActivity.sInstance != null) {
                                  MainActivity.sInstance.triggerWebAction("FAST_FORWARD");
                              }
                              return START_STICKY;
                          } else if ("ACTION_STOP".equals(action)) {
                              if (MainActivity.sInstance != null) {
                                  MainActivity.sInstance.triggerWebAction("STOP");
                              }
                              stopSelf();
                              return START_NOT_STICKY;
                          }
                      }

                      if ("UPDATE_PROGRESS".equals(action) && taskType.equals("media")) {
                          long currentTime = intent.getLongExtra("currentTime", 0);
                          long duration = intent.getLongExtra("duration", 0);
                          boolean isPlaying = intent.getBooleanExtra("isPlaying", true);
                          String trackName = intent.getStringExtra("trackName");
                          updateMediaSession(trackName, "Playing Track", isPlaying, currentTime, duration);
                          return START_STICKY;
                      }

                      NotificationCompat.Builder builder;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          builder = new NotificationCompat.Builder(this, "foreground_tasks");
                      } else {
                          builder = new NotificationCompat.Builder(this);
                      }

                      builder.setSmallIcon(getApplicationInfo().icon)
                              .setOngoing(true)
                              .setColor(ContextCompat.getColor(this, R.color.colorPrimary))
                              .setVisibility(NotificationCompat.VISIBILITY_PUBLIC);

                      Intent notificationIntent = new Intent(this, MainActivity.class);
                      android.app.PendingIntent pendingIntent = android.app.PendingIntent.getActivity(this, 0, notificationIntent, android.app.PendingIntent.FLAG_IMMUTABLE);
                      builder.setContentIntent(pendingIntent);

                      if (taskType.equals("media")) {
                          String trackName = intent.getStringExtra("trackName");
                          String artistName = intent.getStringExtra("artistName");
                          boolean isPlaying = intent.getBooleanExtra("isPlaying", true);
                          updateMediaSession(trackName, artistName, isPlaying, 0, 0);
                          return START_STICKY;
                      } else {
                          if (taskType.equals("recording")) {
                              String title = intent.getStringExtra("title");
                              String message = intent.getStringExtra("message");
                              builder.setContentTitle(title != null ? title : "Audio Recording Active")
                                  .setContentText(message != null ? message : "Recording live audio in background...")
                                  .setSmallIcon(android.R.drawable.presence_video_busy)
                                  .setCategory(NotificationCompat.CATEGORY_SERVICE);
                          } else if (taskType.equals("download")) {
                              String title = intent.getStringExtra("title");
                              String message = intent.getStringExtra("message");
                              builder.setContentTitle(title != null ? title : "File Download Service")
                                  .setContentText(message != null ? message : "Downloading system files...")
                                  .setSmallIcon(android.R.drawable.stat_sys_download)
                                  .setCategory(NotificationCompat.CATEGORY_SERVICE);
                          } else if (taskType.equals("upload")) {
                              String title = intent.getStringExtra("title");
                              String message = intent.getStringExtra("message");
                              builder.setContentTitle(title != null ? title : "Upload Service Active")
                                  .setContentText(message != null ? message : "Uploading data package to cloud server...")
                                  .setSmallIcon(android.R.drawable.stat_sys_upload)
                                  .setCategory(NotificationCompat.CATEGORY_PROGRESS);
                          } else if (taskType.equals("background_task")) {
                              String title = intent.getStringExtra("title");
                              String message = intent.getStringExtra("message");
                              builder.setContentTitle(title != null ? title : "Background Task Running")
                                  .setContentText(message != null ? message : "Processing synchronized database pipelines...")
                                  .setSmallIcon(android.R.drawable.stat_notify_sync)
                                  .setCategory(NotificationCompat.CATEGORY_SERVICE);
                          }
                          startForeground(2002, builder.build());
                      }

                      return START_STICKY;
                  }

                  private android.graphics.Bitmap getAlbumArt(String trackName) {
                      int size = 256;
                      android.graphics.Bitmap bitmap = android.graphics.Bitmap.createBitmap(size, size, android.graphics.Bitmap.Config.ARGB_8888);
                      android.graphics.Canvas canvas = new android.graphics.Canvas(bitmap);
                      
                      android.graphics.Paint paint = new android.graphics.Paint();
                      paint.setAntiAlias(true);
                      
                      android.graphics.LinearGradient gradient = new android.graphics.LinearGradient(
                          0, 0, size, size,
                          new int[]{android.graphics.Color.parseColor("#111827"), android.graphics.Color.parseColor("#1F2937"), android.graphics.Color.parseColor("#111827")},
                          null,
                          android.graphics.Shader.TileMode.CLAMP
                      );
                      paint.setShader(gradient);
                      canvas.drawRoundRect(0, 0, size, size, 24, 24, paint);
                      
                      paint.setShader(null);
                      paint.setStyle(android.graphics.Paint.Style.FILL);
                      paint.setColor(android.graphics.Color.argb(10, 255, 255, 255));
                      canvas.drawCircle(size / 2, size / 2, 100, paint);
                      paint.setColor(android.graphics.Color.argb(16, 255, 255, 255));
                      canvas.drawCircle(size / 2, size / 2, 70, paint);
                      
                      paint.setColor(android.graphics.Color.parseColor("#818CF8"));
                      paint.setTextSize(100.0f);
                      paint.setTypeface(android.graphics.Typeface.create("sans-serif-medium", android.graphics.Typeface.BOLD));
                      paint.setTextAlign(android.graphics.Paint.Align.CENTER);
                      
                      String symbol = "♪";
                      if (trackName != null && !trackName.isEmpty()) {
                          symbol = trackName.substring(0, 1).toUpperCase();
                      }
                      
                      android.graphics.Paint.FontMetrics fm = paint.getFontMetrics();
                      float yOffset = (fm.descent + fm.ascent) / 2;
                      
                      paint.setShadowLayer(8f, 0f, 4f, android.graphics.Color.argb(170, 0, 0, 0));
                      canvas.drawText(symbol, size / 2, (size / 2) - yOffset, paint);
                      
                      return bitmap;
                  }

                  private void updateMediaSession(String trackName, String artistName, boolean isPlaying, long currentTimeMs, long durationMs) {
                      if (mMediaSession == null) return;

                      android.support.v4.media.MediaMetadataCompat.Builder metadataBuilder = new android.support.v4.media.MediaMetadataCompat.Builder();
                      metadataBuilder.putString(android.support.v4.media.MediaMetadataCompat.METADATA_KEY_TITLE, trackName != null ? trackName : "Premium Track");
                      metadataBuilder.putString(android.support.v4.media.MediaMetadataCompat.METADATA_KEY_ARTIST, artistName != null ? artistName : "HopFile Sandbox");
                      metadataBuilder.putLong(android.support.v4.media.MediaMetadataCompat.METADATA_KEY_DURATION, durationMs);

                      android.graphics.Bitmap albumArt = getAlbumArt(trackName);
                      metadataBuilder.putBitmap(android.support.v4.media.MediaMetadataCompat.METADATA_KEY_ALBUM_ART, albumArt);
                      mMediaSession.setMetadata(metadataBuilder.build());

                      android.support.v4.media.session.PlaybackStateCompat.Builder stateBuilder = new android.support.v4.media.session.PlaybackStateCompat.Builder();
                      stateBuilder.setActions(
                              android.support.v4.media.session.PlaybackStateCompat.ACTION_PLAY |
                              android.support.v4.media.session.PlaybackStateCompat.ACTION_PAUSE |
                              android.support.v4.media.session.PlaybackStateCompat.ACTION_SKIP_TO_NEXT |
                              android.support.v4.media.session.PlaybackStateCompat.ACTION_SKIP_TO_PREVIOUS |
                              android.support.v4.media.session.PlaybackStateCompat.ACTION_STOP |
                              android.support.v4.media.session.PlaybackStateCompat.ACTION_SEEK_TO
                      );

                      int state = isPlaying ? android.support.v4.media.session.PlaybackStateCompat.STATE_PLAYING : android.support.v4.media.session.PlaybackStateCompat.STATE_PAUSED;
                      stateBuilder.setState(state, currentTimeMs, 1.0f);
                      mMediaSession.setPlaybackState(stateBuilder.build());

                      Intent prevIntent = new Intent(this, ForegroundService.class).setAction("ACTION_PREV");
                      android.app.PendingIntent pPrev = android.app.PendingIntent.getService(this, 10, prevIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                      Intent playIntent = new Intent(this, ForegroundService.class).setAction("ACTION_TOGGLE_PLAY");
                      android.app.PendingIntent pPlay = android.app.PendingIntent.getService(this, 11, playIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                      Intent nextIntent = new Intent(this, ForegroundService.class).setAction("ACTION_NEXT");
                      android.app.PendingIntent pNext = android.app.PendingIntent.getService(this, 12, nextIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                      Intent rewindIntent = new Intent(this, ForegroundService.class).setAction("ACTION_REWIND");
                      android.app.PendingIntent pRewind = android.app.PendingIntent.getService(this, 16, rewindIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                      Intent ffIntent = new Intent(this, ForegroundService.class).setAction("ACTION_FAST_FORWARD");
                      android.app.PendingIntent pFF = android.app.PendingIntent.getService(this, 17, ffIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                      Intent stopIntent = new Intent(this, ForegroundService.class).setAction("ACTION_STOP");
                      android.app.PendingIntent pStop = android.app.PendingIntent.getService(this, 13, stopIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                      Intent openIntent = new Intent(this, MainActivity.class);
                      openIntent.setFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                      android.app.PendingIntent pOpen = android.app.PendingIntent.getActivity(this, 0, openIntent, android.app.PendingIntent.FLAG_IMMUTABLE);

                      Intent tuikIntent = new Intent(Intent.ACTION_VIEW, Uri.parse("https://github.com/mrtuik"));
                      tuikIntent.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      android.app.PendingIntent pTuik = android.app.PendingIntent.getActivity(this, 15, tuikIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                      android.widget.RemoteViews collapsedViews = new android.widget.RemoteViews(getPackageName(), R.layout.custom_media_collapsed);
                      android.widget.RemoteViews expandedViews = new android.widget.RemoteViews(getPackageName(), R.layout.custom_media_expanded);

                      collapsedViews.setTextViewText(R.id.media_track_title, trackName != null ? trackName : "Premium Track");
                      collapsedViews.setImageViewBitmap(R.id.media_album_art, albumArt);

                      expandedViews.setTextViewText(R.id.media_track_title_large, trackName != null ? trackName : "Premium Track");
                      expandedViews.setImageViewBitmap(R.id.media_album_art_large, albumArt);

                      int playPauseIcon = isPlaying ? R.drawable.ic_notification_pause : R.drawable.ic_notification_play;
                      collapsedViews.setImageViewResource(R.id.btn_play_pause, playPauseIcon);
                      expandedViews.setImageViewResource(R.id.btn_play_pause_large, playPauseIcon);

                      int progressPercent = 0;
                      if (durationMs > 0) {
                          progressPercent = (int) (currentTimeMs * 100 / durationMs);
                      }
                      collapsedViews.setProgressBar(R.id.custom_media_progress, 100, progressPercent, false);
                      expandedViews.setProgressBar(R.id.custom_media_progress_large, 100, progressPercent, false);
                      
                      long currentSecs = currentTimeMs / 1000;
                      long totalSecs = durationMs / 1000;
                      
                      long currentMins = currentSecs / 60;
                      long currentLeftSecs = currentSecs % 60;
                      long totalMins = totalSecs / 60;
                      long totalLeftSecs = totalSecs % 60;
                      
                      String currentTimeStr = currentMins + ":" + (currentLeftSecs < 10 ? "0" : "") + currentLeftSecs;
                      String totalTimeStr = totalMins + ":" + (totalLeftSecs < 10 ? "0" : "") + totalLeftSecs;
                      
                      expandedViews.setTextViewText(R.id.txt_current_time, currentTimeStr);
                      expandedViews.setTextViewText(R.id.txt_total_duration, totalTimeStr);

                      collapsedViews.setOnClickPendingIntent(R.id.btn_prev, pPrev);
                      collapsedViews.setOnClickPendingIntent(R.id.btn_play_pause, pPlay);
                      collapsedViews.setOnClickPendingIntent(R.id.btn_next, pNext);
                      collapsedViews.setOnClickPendingIntent(R.id.tuik_badge, pTuik);
                      collapsedViews.setOnClickPendingIntent(R.id.notification_root, pOpen);

                      expandedViews.setOnClickPendingIntent(R.id.btn_prev_large, pPrev);
                      expandedViews.setOnClickPendingIntent(R.id.btn_rewind_large, pRewind);
                      expandedViews.setOnClickPendingIntent(R.id.btn_play_pause_large, pPlay);
                      expandedViews.setOnClickPendingIntent(R.id.btn_fast_forward_large, pFF);
                      expandedViews.setOnClickPendingIntent(R.id.btn_next_large, pNext);
                      expandedViews.setOnClickPendingIntent(R.id.btn_stop, pStop);
                      expandedViews.setOnClickPendingIntent(R.id.tuik_badge_large, pTuik);
                      expandedViews.setOnClickPendingIntent(R.id.notification_root_large, pOpen);

                      NotificationCompat.Builder builder;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          builder = new NotificationCompat.Builder(this, "media_channel");
                      } else {
                          builder = new NotificationCompat.Builder(this);
                      }

                      builder.setSmallIcon(getApplicationInfo().icon)
                              .setCustomContentView(collapsedViews)
                              .setCustomBigContentView(expandedViews)
                              .setOngoing(isPlaying)
                              .setColor(ContextCompat.getColor(this, R.color.colorPrimary))
                              .setVisibility(NotificationCompat.VISIBILITY_PUBLIC)
                              .setCategory(NotificationCompat.CATEGORY_TRANSPORT);

                      if (isPlaying) {
                          startForeground(2002, builder.build());
                      } else {
                          stopForeground(false);
                          NotificationManagerCompat.from(this).notify(2002, builder.build());
                      }
                  }

                  @Override
                  public void onDestroy() {
                      if (mMediaSession != null) {
                          mMediaSession.release();
                      }
                      super.onDestroy();
                  }

                  @Override
                  public android.os.IBinder onBind(Intent intent) {
                      return null;
                  }
              }
          }
          """
          
          main_activity_java = main_activity_java_template.replace("__SWIPE_IMPORT__", swipe_import_block)
          main_activity_java = main_activity_java.replace("__SWIPE_DECLARATION__", swipe_declaration_block)
          main_activity_java = main_activity_java.replace("__PROGRESS_DECLARATION__", progress_declaration_block)
          main_activity_java = main_activity_java.replace("__PROGRESS_INIT__", progress_init_block)
          main_activity_java = main_activity_java.replace("__LOCAL_STORAGE__", local_storage_block)
          main_activity_java = main_activity_java.replace("__ZOOM__", zoom_block)
          main_activity_java = main_activity_java.replace("__AUTOPLAY_UA__", autoplay_ua_block)
          main_activity_java = main_activity_java.replace("__SWIPE_REFRESH_CODE__", swipe_refresh_code_block)
          main_activity_java = main_activity_java.replace("__LONG_PRESS__", long_press_code_block)
          main_activity_java = main_activity_java.replace("__DOWNLOAD_MANAGER__", download_manager_block)
          main_activity_java = main_activity_java.replace("__SWIPE_REFRESH_STOP_CODE__", swipe_refresh_stop_code_block)
          main_activity_java = main_activity_java.replace("__PROGRESS_UPDATE__", progress_update_block)
          main_activity_java = main_activity_java.replace("__PERMISSION_MANAGER__", permission_manager_block)
          main_activity_java = main_activity_java.replace("__HOMEPAGE__", homepage)

          main_activity_java = main_activity_java.replace("__KEEP_SCREEN_ON__", "true" if keep_screen_on_enabled else "false")
          main_activity_java = main_activity_java.replace("__SECURE_WINDOW__", "true" if secure_window_enabled else "false")
          main_activity_java = main_activity_java.replace("__GEOLOCATION_ENABLED__", "true" if location_enabled else "false")
          main_activity_java = main_activity_java.replace("__EXTERNAL_BROWSER_ENABLED__", "true" if external_browser_enabled else "false")
          main_activity_java = main_activity_java.replace("__FILE_TRANSFER_ENABLED__", "true" if file_transfer_enabled else "false")
          main_activity_java = main_activity_java.replace("__CLIPBOARD_ENABLED__", "true" if clipboard_enabled else "false")
          main_activity_java = main_activity_java.replace("__DOUBLE_BACK_EXIT__", "true" if double_back_exit_enabled else "false")

          if biometric_enabled:
              main_activity_java = main_activity_java.replace("__BIOMETRIC_IMPORTS__", "import androidx.biometric.BiometricPrompt;\nimport androidx.biometric.BiometricManager;")
              biometric_logic = """
                  BiometricManager biometricManager = BiometricManager.from(this);
                  switch (biometricManager.canAuthenticate(BiometricManager.Authenticators.BIOMETRIC_STRONG | BiometricManager.Authenticators.DEVICE_CREDENTIAL)) {
                      case BiometricManager.BIOMETRIC_SUCCESS:
                          java.util.concurrent.Executor executor = androidx.core.content.ContextCompat.getMainExecutor(this);
                          BiometricPrompt biometricPrompt = new BiometricPrompt(MainActivity.this,
                                  executor, new BiometricPrompt.AuthenticationCallback() {
                              @Override
                              public void onAuthenticationError(int errorCode, CharSequence errString) {
                                  Toast.makeText(MainActivity.this, "Authentication error: " + errString, Toast.LENGTH_SHORT).show();
                                  finish();
                              }

                              @Override
                              public void onAuthenticationSucceeded(BiometricPrompt.AuthenticationResult result) {
                                  Toast.makeText(MainActivity.this, "Authentication succeeded!", Toast.LENGTH_SHORT).show();
                              }

                              @Override
                              public void onAuthenticationFailed() {
                                  Toast.makeText(MainActivity.this, "Authentication failed", Toast.LENGTH_SHORT).show();
                              }
                          });

                          BiometricPrompt.PromptInfo promptInfo = new BiometricPrompt.PromptInfo.Builder()
                                  .setTitle("Biometric Login")
                                  .setSubtitle("Log in using your credentials")
                                  .setAllowedAuthenticators(BiometricManager.Authenticators.BIOMETRIC_STRONG | BiometricManager.Authenticators.DEVICE_CREDENTIAL)
                                  .build();

                          biometricPrompt.authenticate(promptInfo);
                          break;
                      default:
                          break;
                  }
              """
              main_activity_java = main_activity_java.replace("__BIOMETRIC_INIT_LOGIC__", biometric_logic.strip())
          else:
              main_activity_java = main_activity_java.replace("__BIOMETRIC_IMPORTS__", "")
              main_activity_java = main_activity_java.replace("__BIOMETRIC_INIT_LOGIC__", "")

          php_support_val = "true" if php_support else "false"
          main_activity_java = main_activity_java.replace("__PHP_SUPPORT_ENABLED__", php_support_val)
          main_activity_java = main_activity_java.replace("__PHP_PORT__", str(php_port))

          with open("app/src/main/java/com/example/runner/MainActivity.java", "w") as f:
              f.write(main_activity_java.strip())

          icon_src = "app/src/main/assets/_app_icon.png"
          if os.path.exists(icon_src):
              sizes = {
                  "mipmap-mdpi": 48,
                  "mipmap-hdpi": 72,
                  "mipmap-xhdpi": 96,
                  "mipmap-xxhdpi": 144,
                  "mipmap-xxxhdpi": 192
              }
              try:
                  with Image.open(icon_src) as img:
                      for folder, size in sizes.items():
                          dest_dir = f"app/src/main/res/{folder}"
                          os.makedirs(dest_dir, exist_ok=True)
                          resized_img = img.resize((size, size), Image.Resampling.LANCZOS)
                          resized_img.save(f"{dest_dir}/ic_launcher.png")
              except Exception as e:
                  print(f"Error resizing launcher icon: {e}")
          else:
              dest_dir = "app/src/main/res/mipmap-xxhdpi"
              os.makedirs(dest_dir, exist_ok=True)
              try:
                  url = "https://raw.githubusercontent.com/android/platform_development/master/apps/Development/res/mipmap-xxhdpi/ic_launcher_android.png"
                  urllib.request.urlretrieve(url, f"{dest_dir}/ic_launcher.png")
              except Exception as e:
                  print(f"Failed to fetch default icon: {e}")

          splash_src = "app/src/main/assets/_splash_icon.png"
          if os.path.exists(splash_src) and splash_screen_enabled:
              os.makedirs("app/src/main/res/drawable", exist_ok=True)
              try:
                  with Image.open(splash_src) as img:
                      resized_img = img.resize((512, 512), Image.Resampling.LANCZOS)
                      resized_img.save("app/src/main/res/drawable/splash_icon.png")
              except Exception as e:
                  print(f"Error resizing splash icon: {e}")
          EOF
          python3 build_assets.py

      - name: Write strings.xml resource values
        run: |
          cat << EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">${APP_NAME}</string>
          </resources>
          EOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0.2

      - name: Developer Mode Compilation Log Summary
        run: |
          echo "### Generated Android Manifest Settings" >> $GITHUB_STEP_SUMMARY
          echo '```xml' >> $GITHUB_STEP_SUMMARY
          cat app/src/main/AndroidManifest.xml >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run APK Compile Gradle Task
        run: |
          ./gradlew :app:assembleDebug

      - name: Package APK into ZIP and Rename
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          cat << 'EOF' > app/build/outputs/apk/debug/credits.txt
          ==================================================
          HopFile Editor - Release Staging Package
          ==================================================
          This package was generated dynamically by HopFile Editor Workspace.

          Credits:
          HopFile Editor is designed, developed, and maintained by tuik.
          All rights reserved.

          Thank you for choosing HopFile Editor as your Mobile IDE & Compiler!
          ==================================================
          EOF
          
          cd app/build/outputs/apk/debug/
          mv app-debug.apk $APK_NAME
          zip -r $ZIP_NAME $APK_NAME credits.txt

      - name: Generate Unique Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          TAG="release-${CLEANED_NAME}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package build for **${{ env.APP_NAME }}**
            - **Package ID:** `${{ env.PACKAGE_ID }}`
            - **Build ID:** `${{ github.run_number }}`
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload zip from git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary build payload [skip ci]" || true
          git push origin main || git push origin master || true
