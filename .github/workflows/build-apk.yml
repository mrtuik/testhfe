name: Build APK from Web Archive

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Licenses Auto-Accept)
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Initialize Android Web-View Wrapper Template
        run: |
          echo "Initializing lightweight Gradle project structure..."
          mkdir -p app/src/main/java/com/example/runner
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          
          echo "org.gradle.java.home=${JAVA_HOME}" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat << 'EOF' > settings.gradle
          rootProject.name = 'WebRunner'
          include ':app'
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Fetch and Wrap Website Archive ZIP
        run: |
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          
          unzip -o "${ZIP_NAME}" -d app/src/main/assets/
          
          if [ ! -f app/src/main/assets/index.html ]; then
              SUBDIR=$(find app/src/main/assets/ -name "index.html" -print -quit | sed 's|/index.html||')
              if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "app/src/main/assets" ]; then
                  mv "$SUBDIR"/* app/src/main/assets/
              fi
          fi

      - name: Generate Native Android Code from app_config.json
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pil
          
          cat << 'EOF' > build_assets.py
          import json, os, urllib.request
          from PIL import Image

          config_path = "app/src/main/assets/app_config.json"
          config = {}
          if os.path.exists(config_path):
              with open(config_path, "r") as f:
                  config = json.load(f)

          package_id = config.get("packageName", os.environ.get("PACKAGE_ID", "com.example.runner"))
          version_name = config.get("versionName", os.environ.get("VERSION_NAME", "1.0.0"))
          version_code = int(config.get("versionCode", os.environ.get("VERSION_CODE", "1")))
          theme_color = config.get("themeColor", "#4F46E5")
          homepage = config.get("homepage", "index.html")
          screen_rotation = config.get("screenRotation", "auto")
          splash_bg_color = config.get("splashBgColor", "#111827")
          splash_duration = int(config.get("splashDuration", 2000))
          fullscreen_enabled = config.get("fullscreenEnabled", True)
          hide_title_bar = config.get("hideTitleBar", True)
          has_custom_splash = config.get("hasCustomSplash", False)
          loading_ui_enabled = config.get("loadingUIEnabled", True)
          swipe_refresh_enabled = config.get("swipeRefreshEnabled", True)

          app_build_gradle = f"""
          apply plugin: 'com.android.application'
          android {{
              namespace 'com.example.runner'
              compileSdk 33
              defaultConfig {{
                  applicationId "{package_id}"
                  minSdk 24
                  targetSdk 33
                  versionCode {version_code}
                  versionName "{version_name}"
              }}
              buildTypes {{
                  release {{
                      minifyEnabled false
                  }}
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
          }}
          """
          with open("app/build.gradle", "w") as f: f.write(app_build_gradle)
          
          with open("app/src/main/res/values/colors.xml", "w") as f: f.write(f'<resources><color name="colorPrimary">{theme_color}</color><color name="splashBg">{splash_bg_color}</color></resources>')

          theme_style_parent = "Theme.AppCompat.Light.NoActionBar" if hide_title_bar else "Theme.AppCompat.Light.DarkActionBar"
          theme_items = "<item name=\\"android:windowFullscreen\\">true</item>" if fullscreen_enabled else ""
          with open("app/src/main/res/values/styles.xml", "w") as f: f.write(f'<resources><style name="SplashTheme" parent="Theme.AppCompat.NoActionBar"><item name="android:windowBackground">@color/splashBg</item></style><style name="AppTheme" parent="{theme_style_parent}"><item name="colorPrimary">@color/colorPrimary</item>{theme_items}</style></resources>')

          splash_src = "@drawable/splash_icon" if has_custom_splash else "@mipmap/ic_launcher"
          with open("app/src/main/res/layout/activity_splash.xml", "w") as f: f.write(f'<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="@color/splashBg"><ImageView android:layout_width="120dp" android:layout_height="120dp" android:layout_centerInParent="true" android:src="{splash_src}"/></RelativeLayout>')
          
          loading_bar = '<ProgressBar android:id="@+id/progressBar" style="?android:attr/progressBarStyleHorizontal" android:layout_width="match_parent" android:layout_height="3dp" android:layout_alignParentTop="true" android:visibility="gone" />' if loading_ui_enabled else ""
          swipe_start = '<androidx.swiperefreshlayout.widget.SwipeRefreshLayout android:id="@+id/swipeRefreshLayout" android:layout_width="match_parent" android:layout_height="match_parent">' if swipe_refresh_enabled else ""
          swipe_end = '</androidx.swiperefreshlayout.widget.SwipeRefreshLayout>' if swipe_refresh_enabled else ""
          with open("app/src/main/res/layout/activity_main.xml", "w") as f: f.write(f'<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">{loading_bar}{swipe_start}<WebView android:id="@+id/webview" android:layout_width="match_parent" android:layout_height="match_parent" />{swipe_end}</RelativeLayout>')
          
          orientation = "portrait" if screen_rotation == "portrait" else "landscape" if screen_rotation == "landscape" else "unspecified"
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(f'<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="{package_id}"><uses-permission android:name="android.permission.INTERNET"/><application android:usesCleartextTraffic="true" android:theme="@style/AppTheme" android:icon="@mipmap/ic_launcher" android:label="@string/app_name"><activity android:name=".SplashActivity" android:exported="true" android:theme="@style/SplashTheme" android:screenOrientation="{orientation}"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity><activity android:name=".MainActivity" android:screenOrientation="{orientation}"/></application></manifest>')
          
          with open("app/src/main/java/com/example/runner/SplashActivity.java", "w") as f: f.write(f"package com.example.runner;\\nimport androidx.appcompat.app.AppCompatActivity;\\nimport android.content.Intent;\\nimport android.os.Bundle;\\nimport android.os.Handler;\\npublic class SplashActivity extends AppCompatActivity {{ @Override protected void onCreate(Bundle savedInstanceState) {{ super.onCreate(savedInstanceState); setContentView(R.layout.activity_splash); new Handler().postDelayed(() -> {{ startActivity(new Intent(this, MainActivity.class)); finish(); }}, {splash_duration}); }} }}")
          
          with open("app/src/main/java/com/example/runner/MainActivity.java", "w") as f: f.write(f"package com.example.runner;\\nimport androidx.appcompat.app.AppCompatActivity;\\nimport android.os.Bundle;\\nimport android.webkit.WebView;\\npublic class MainActivity extends AppCompatActivity {{ @Override protected void onCreate(Bundle savedInstanceState) {{ super.onCreate(savedInstanceState); setContentView(R.layout.activity_main); WebView webView = findViewById(R.id.webview); webView.getSettings().setJavaScriptEnabled(true); webView.loadUrl(\\\"file:///android_asset/{homepage}\\\"); }} }}")

          icon_src = "app/src/main/assets/_app_icon.png"
          if os.path.exists(icon_src):
              sizes = [("mipmap-mdpi", 48), ("mipmap-hdpi", 72), ("mipmap-xhdpi", 96), ("mipmap-xxhdpi", 144), ("mipmap-xxxhdpi", 192)]
              with Image.open(icon_src) as img:
                  for folder, size in sizes:
                      os.makedirs(f"app/src/main/res/{folder}", exist_ok=True)
                      img.resize((size, size), Image.Resampling.LANCZOS).save(f"app/src/main/res/{folder}/ic_launcher.png")
          
          splash_img_src = "app/src/main/assets/_splash_icon.png"
          if os.path.exists(splash_img_src):
              os.makedirs("app/src/main/res/drawable", exist_ok=True)
              with Image.open(splash_img_src) as img:
                  img.resize((512, 512), Image.Resampling.LANCZOS).save("app/src/main/res/drawable/splash_icon.png")

          EOF
          python3 build_assets.py

      - name: Write strings.xml
        run: |
          echo '<resources><string name="app_name">${APP_NAME}</string></resources>' > app/src/main/res/values/strings.xml

      - name: Run APK Compile Gradle Task
        run: |
          cd app
          ../gradlew assembleDebug

      - name: Rename and Prepare Artifacts
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          mv app/build/outputs/apk/debug/app-debug.apk "app/${APK_NAME}"

      - name: Upload APK as a Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}.apk
          path: app/*.apk
          retention-days: 7

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Release ${{ env.APP_NAME }} v${{ env.VERSION_NAME }}"
          body: "Automated Build"
          files: app/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary payload [skip ci]" || true
          git push origin main || git push origin master || true
